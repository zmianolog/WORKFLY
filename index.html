<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKFLY — makieta v6</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>html,body{margin:0;padding:0;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useLayoutEffect, useEffect } = React;

// ===== MAGAZYN (wspólna baza w localStorage) =====
// ============================================================
// WORKFLY v6 — MAGAZYN (wspólna warstwa danych, localStorage)
// Jedna baza dla wszystkich modułów: procesy (rodziny wersji),
// zlecenia, tikety, ad hoc, stanowiska. Autozapis, eksport/import.
// Silnik: generowanie tiketów, aktywacja, decyzje XOR, odhacz NT.
// OGRANICZENIE: baza żyje w JEDNEJ przeglądarce (localStorage).
// PĘTLE: domknięcie kroku-źródła pętli tworzy tiket decyzyjny
// "powtórzyć / dalej". "Powtórz" klonuje tikety ciała pętli jako
// iterację n+1 (numer ·2, ·3...). Limit ogranicza liczbę powtórzeń.
// ============================================================

const MAGAZYN_KLUCZ = 'workfly_baza_v6';

const MAGAZYN_PUSTY = () => ({
  wersjaSchematu: 6,
  procesy: [],     // {id, rodzinaId, wersja, nazwa, status: szkic|opublikowany|wycofany|archiwum, kroki:[], przejscia:[], utworzono, opublikowano}
  zlecenia: [],    // {id, nr, procesId, klient, dataStart, priorytet, wartosc, pm, status: w_toku|zakonczone, utworzono}
  tikety: [],      // {id, zlecenieId, krokId, nazwa, numer, stanowisko, osoba, widoczny, wymagaDowodu, dowodDolaczony, sla, slaJedn, typ: zadanie|decyzja, stan: oczekujacy|warunkowy|aktywny|anulowany, statusPracy: do|trakcie|zrobione, deadline, dokZadania:[], dokZlecenia:[], galaz, bramkaId}
  decyzjeXor: [],  // {zlecenieId, bramkaKrokId, wybranePrzejscieId, kiedy}
  adhoc: [],       // tikety ad hoc (jak w module pracownika)
  stanowiska: ['Serwisant', 'Koordynator', 'COO', 'Klient'],
  licznikZlecen: 17,
});

let _cache = null;
const _subs = new Set();

function bazaWczytaj() {
  if (_cache) return _cache;
  try {
    const raw = window.localStorage.getItem(MAGAZYN_KLUCZ);
    _cache = raw ? JSON.parse(raw) : MAGAZYN_PUSTY();
  } catch (e) { _cache = MAGAZYN_PUSTY(); }
  return _cache;
}
function bazaZapisz() {
  // świeża referencja po każdej zmianie — inaczej useMemo([baza]) w modułach
  // nie przeliczy się (mutacja w miejscu = ta sama referencja). Dane są małe,
  // głęboka kopia jest tania i gwarantuje spójny re-render wszędzie.
  _cache = JSON.parse(JSON.stringify(_cache));
  try { window.localStorage.setItem(MAGAZYN_KLUCZ, JSON.stringify(_cache)); } catch (e) {}
  _subs.forEach(fn => { try { fn(); } catch (e) {} });
}
function bazaSubskrybuj(fn) { _subs.add(fn); return () => _subs.delete(fn); }
function bazaMutuj(fn) { const b = bazaWczytaj(); fn(b); bazaZapisz(); return b; }
function uidB() { return 'id_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

// ---------- PROCESY: rodzina wersji ----------
function procesyLista() {
  const b = bazaWczytaj();
  return b.procesy.slice().sort((a, c) => (a.nazwa || '').localeCompare(c.nazwa || '') || a.wersja - c.wersja);
}
function procesZapiszSzkic(proc) {
  // autozapis szkicu: nadpisuje rekord o tym samym id (szkic wolno nadpisywać)
  bazaMutuj(b => {
    const i = b.procesy.findIndex(p => p.id === proc.id);
    if (i >= 0) b.procesy[i] = proc; else b.procesy.push(proc);
  });
}
function procesNowy(nazwa) {
  const id = uidB();
  const proc = { id, rodzinaId: id, wersja: 1, nazwa: nazwa || 'Nowy proces', status: 'szkic', kroki: [], przejscia: [], utworzono: new Date().toISOString() };
  bazaMutuj(b => b.procesy.push(proc));
  return proc;
}
function procesOpublikuj(procId) {
  bazaMutuj(b => {
    const p = b.procesy.find(x => x.id === procId);
    if (!p) return;
    // poprzednia opublikowana w rodzinie -> wycofana
    b.procesy.filter(x => x.rodzinaId === p.rodzinaId && x.status === 'opublikowany' && x.id !== p.id)
      .forEach(x => { x.status = 'wycofany'; });
    p.status = 'opublikowany';
    p.opublikowano = new Date().toISOString();
  });
}
function procesNowaWersja(procId) {
  // edycja opublikowanego = szkic n+1 (kopia struktury); zwraca nowy szkic
  const b = bazaWczytaj();
  const stary = b.procesy.find(p => p.id === procId);
  if (!stary) return null;
  const maxW = Math.max(...b.procesy.filter(p => p.rodzinaId === stary.rodzinaId).map(p => p.wersja));
  const nowy = JSON.parse(JSON.stringify(stary));
  nowy.id = uidB(); nowy.wersja = maxW + 1; nowy.status = 'szkic';
  nowy.utworzono = new Date().toISOString(); delete nowy.opublikowano;
  bazaMutuj(bb => bb.procesy.push(nowy));
  return nowy;
}
function procesUsunZArchiwum(procId) {
  bazaMutuj(b => { b.procesy = b.procesy.filter(p => !(p.id === procId && p.status === 'archiwum')); });
}
function procesSzkicUsun(procId) {
  bazaMutuj(b => { b.procesy = b.procesy.filter(p => !(p.id === procId && p.status === 'szkic')); });
}
function sprawdzArchiwizacje() {
  // wycofana wersja bez żadnego niezakończonego zlecenia -> archiwum (spec 7.1)
  bazaMutuj(b => {
    b.procesy.filter(p => p.status === 'wycofany').forEach(p => {
      const zywe = b.zlecenia.some(z => z.procesId === p.id && z.status !== 'zakonczone');
      if (!zywe) p.status = 'archiwum';
    });
  });
}

// ---------- SILNIK: generowanie i aktywacja tiketów ----------
function _nastepniki(proc, krokId) { return proc.przejscia.filter(p => p.zrodlo === krokId && !p.petla); }
function _petlaZ(proc, krokId) { return proc.przejscia.find(p => p.petla && p.zrodlo === krokId); }
function _cialoPetli(proc, petlaP) {
  // kroki od celu pętli do jej źródła włącznie (BFS w przód, bez krawędzi petla)
  const cialo = new Set(); const kolejka = [petlaP.cel];
  while (kolejka.length) {
    const kid = kolejka.shift();
    if (cialo.has(kid)) continue;
    cialo.add(kid);
    if (kid === petlaP.zrodlo) continue; // źródło zamyka ciało
    proc.przejscia.filter(p => p.zrodlo === kid && !p.petla).forEach(p => kolejka.push(p.cel));
  }
  return cialo;
}
function _poprzedniki(proc, krokId) { return proc.przejscia.filter(p => p.cel === krokId && !p.petla); }

function generujTikety(proc, zlecenie) {
  // tiket z KAŻDEGO kroku-zadania/końca (v6); bramki -> tikety decyzyjne tworzone w locie
  const tikety = [];
  const numeracja = {}; // policz prostą numerację jak w modelowaniu
  let lic = 0;
  proc.kroki.forEach(k => {
    const wejB = proc.przejscia.find(p => p.cel === k.id && p.bramka);
    if (wejB) {
      const rodz = proc.przejscia.filter(p => p.zrodlo === wejB.zrodlo);
      const idx = rodz.findIndex(p => p.cel === k.id);
      numeracja[k.id] = (numeracja[wejB.zrodlo] || '?') + String.fromCharCode(97 + Math.max(0, idx));
    } else { lic++; numeracja[k.id] = String(lic); }
  });
  proc.kroki.filter(k => k.typ === 'zadanie' || k.typ === 'koniec').forEach(k => {
    const zaXor = proc.przejscia.some(p => p.cel === k.id && p.bramka === 'XOR');
    tikety.push({
      id: uidB(), zlecenieId: zlecenie.id, krokId: k.id, typ: 'zadanie',
      nazwa: k.nazwa, numer: numeracja[k.id] || '?',
      stanowisko: k.stanowisko || 'Nieprzypisane', osoba: zlecenie.przypisania?.[k.stanowisko] || null,
      widoczny: k.tiketowy !== false, wymagaDowodu: !!k.wymagaZdjecia, dowodDolaczony: false,
      sla: k.sla || '', slaJedn: k.slaJedn || 'dni',
      dokZadania: (k.linki || []).map(l => ({ nazwa: l.nazwa, url: l.url || '#' })),
      dokZlecenia: zlecenie.dokTiketu?.[numeracja[k.id]] || [],
      stan: zaXor ? 'warunkowy' : 'oczekujacy', statusPracy: 'do', iteracja: 1,
      deadline: null, zlecenieNr: zlecenie.nr, klient: zlecenie.klient,
    });
  });
  return tikety;
}

function przeliczAktywacje(zlecenieId) {
  // rdzeń silnika: aktywuj tikety, których poprzedniki są spełnione;
  // twórz tikety decyzyjne przy XOR; zejście 'wszystkie' czeka na komplet.
  bazaMutuj(b => {
    const z = b.zlecenia.find(x => x.id === zlecenieId); if (!z) return;
    const proc = b.procesy.find(p => p.id === z.procesId); if (!proc) return;
    const tk = b.tikety.filter(t => t.zlecenieId === zlecenieId);
    // najnowsza iteracja per krok (pętle tworzą kolejne tikety tego samego kroku)
    const tikPoKroku = {};
    tk.forEach(t => {
      if (t.typ !== 'zadanie') return;
      const ex = tikPoKroku[t.krokId];
      if (!ex || (t.iteracja || 1) > (ex.iteracja || 1)) tikPoKroku[t.krokId] = t;
    });
    const zrobiony = kid => { const t = tikPoKroku[kid]; return t && t.statusPracy === 'zrobione' && t.stan !== 'anulowany'; };
    const iterKroku = kid => (tikPoKroku[kid] && tikPoKroku[kid].iteracja) || 1;
    const liczbaPowtorzen = pid => b.decyzjeXor.filter(d => d.zlecenieId === zlecenieId && d.wybranePrzejscieId === pid).length;
    // krok-źródło pętli "przepuszcza" przepływ dalej dopiero po decyzji "dalej"
    // (albo gdy limit powtórzeń wyczerpany — wtedy automatycznie dalej)
    const przepuszcza = kid => {
      if (!zrobiony(kid)) return false;
      const pet = _petlaZ(proc, kid);
      if (!pet) return true;
      if (pet.limit && liczbaPowtorzen(pet.id) >= pet.limit) return true;
      return b.decyzjeXor.some(d => d.zlecenieId === zlecenieId && d.bramkaKrokId === kid && d.wybranePrzejscieId === '__dalej__' && (d.iteracja || 1) === iterKroku(kid));
    };

    function krokSpelniony(kid) {
      // czy "wyjście" z tego węzła może aktywować następnik
      const krok = proc.kroki.find(k => k.id === kid);
      if (!krok) return false;
      if (krok.typ === 'zadanie' || krok.typ === 'koniec') return przepuszcza(kid);
      if (krok.typ === 'bramka') {
        // bramka spełniona, gdy jej poprzednik spełniony ORAZ (XOR: jest decyzja)
        const wej = _poprzedniki(proc, kid);
        const wejOk = wej.length === 0 || wej.every(p => krokSpelniony(p.zrodlo));
        if (!wejOk) return false;
        if (krok.podtyp === 'XOR') {
          const iterBramki = Math.max(1, ...wej.map(p => iterKroku(p.zrodlo)));
          return b.decyzjeXor.some(d => d.zlecenieId === zlecenieId && d.bramkaKrokId === kid && (d.iteracja || 1) === iterBramki);
        }
        return true; // AND: spełniona od razu po wejściu
      }
      return false;
    }

    tk.filter(t => t.typ === 'zadanie' && (t.stan === 'oczekujacy' || t.stan === 'warunkowy') && t === tikPoKroku[t.krokId]).forEach(t => {
      const wej = _poprzedniki(proc, t.krokId);
      if (wej.length === 0) { t.stan = 'aktywny'; return; } // pierwszy krok
      const krok = proc.kroki.find(k => k.id === t.krokId);
      const trybZejscia = wej.length > 1 ? (krok?.trybZejscia || 'wszystkie') : 'wszystkie';
      const sprawdzWejscie = (p) => {
        const zrodloKrok = proc.kroki.find(k => k.id === p.zrodlo);
        if (zrodloKrok?.typ === 'bramka' && zrodloKrok.podtyp === 'XOR') {
          // aktywuj tylko wybraną gałąź
          const decs = b.decyzjeXor.filter(d => d.zlecenieId === zlecenieId && d.bramkaKrokId === p.zrodlo);
          const dec = decs.length ? decs[decs.length - 1] : null;
          return !!dec && dec.wybranePrzejscieId === p.id && krokSpelniony(p.zrodlo);
        }
        return krokSpelniony(p.zrodlo);
      };
      const ok = trybZejscia === 'pierwsza' ? wej.some(sprawdzWejscie) : wej.every(sprawdzWejscie);
      if (ok) t.stan = 'aktywny';
    });

    // tikety decyzyjne XOR: bramka z wejściem spełnionym i bez decyzji -> tiket 'decyzja' (jeśli nie istnieje)
    proc.kroki.filter(k => k.typ === 'bramka' && k.podtyp === 'XOR').forEach(br => {
      const wej = _poprzedniki(proc, br.id);
      const wejOk = wej.length === 0 || wej.every(p => krokSpelniony(p.zrodlo));
      const iterBramki = Math.max(1, ...(_poprzedniki(proc, br.id).map(p => iterKroku(p.zrodlo))), 1);
      const maDecyzje = b.decyzjeXor.some(d => d.zlecenieId === zlecenieId && d.bramkaKrokId === br.id && (d.iteracja || 1) === iterBramki);
      const istnieje = b.tikety.some(t => t.zlecenieId === zlecenieId && t.typ === 'decyzja' && t.krokId === br.id && (t.iteracja || 1) === iterBramki);
      if (wejOk && !maDecyzje && !istnieje) {
        b.tikety.push({ id: uidB(), zlecenieId, krokId: br.id, typ: 'decyzja', nazwa: br.nazwa || 'Decyzja',
          numer: '', stanowisko: '—', widoczny: false, stan: 'aktywny', statusPracy: 'do', iteracja: iterBramki,
          galezie: _nastepniki(proc, br.id).map(p => ({ przejscieId: p.id, etykieta: p.etykieta || 'ścieżka' })),
          zlecenieNr: z.nr, klient: z.klient });
      }
    });

    // tikety decyzyjne PĘTLI: krok-źródło zrobiony, limit niewyczerpany, brak decyzji w tej iteracji
    proc.przejscia.filter(p => p.petla).forEach(pet => {
      const kid = pet.zrodlo;
      if (!zrobiony(kid)) return;
      if (pet.limit && liczbaPowtorzen(pet.id) >= pet.limit) return;
      const iter = iterKroku(kid);
      const maDec = b.decyzjeXor.some(d => d.zlecenieId === zlecenieId && d.bramkaKrokId === kid && (d.iteracja || 1) === iter);
      const jest = b.tikety.some(t => t.zlecenieId === zlecenieId && t.typ === 'decyzja' && t.krokId === kid && (t.iteracja || 1) === iter);
      if (maDec || jest) return;
      const krokZrodlo = proc.kroki.find(k => k.id === kid);
      const celKrok = proc.kroki.find(k => k.id === pet.cel);
      b.tikety.push({ id: uidB(), zlecenieId, krokId: kid, typ: 'decyzja', podtyp: 'petla', iteracja: iter,
        nazwa: 'Pętla: powtórzyć od „' + ((celKrok && celKrok.nazwa) || '?') + '"?' + (pet.limit ? ' (limit ' + pet.limit + '×)' : ''),
        numer: '', stanowisko: '—', widoczny: false, stan: 'aktywny', statusPracy: 'do',
        galezie: [ { przejscieId: pet.id, etykieta: '↩ powtórz' }, { przejscieId: '__dalej__', etykieta: 'dalej (bez powtórki)' } ],
        zlecenieNr: z.nr, klient: z.klient });
    });

    // zakończenie zlecenia: dowolny krok 'koniec' na aktywnej ścieżce zrobiony
    const konce = proc.kroki.filter(k => k.typ === 'koniec');
    if (konce.length && konce.some(k => zrobiony(k.id))) z.status = 'zakonczone';
  });
  sprawdzArchiwizacje();
}

function uruchomZlecenie(proc, dane) {
  const b = bazaWczytaj();
  b.licznikZlecen = (b.licznikZlecen || 17) + 1;
  const z = { id: uidB(), nr: `ZLEC-2026-${String(b.licznikZlecen).padStart(3, '0')}`,
    procesId: proc.id, klient: dane.klient || '', dataStart: dane.dataStart || '',
    priorytet: dane.priorytet || 'normalny', wartosc: dane.wartosc || '', pm: dane.pm || '',
    przypisania: dane.przypisania || {}, dokTiketu: dane.dokTiketu || {},
    status: 'w_toku', utworzono: new Date().toISOString() };
  const tk = generujTikety(proc, z);
  bazaMutuj(bb => { bb.zlecenia.push(z); bb.tikety.push(...tk); });
  przeliczAktywacje(z.id);
  return z;
}

function tiketUstaw(tiketId, zmiany) {
  let zlecenieId = null;
  bazaMutuj(b => { const t = b.tikety.find(x => x.id === tiketId); if (t) { Object.assign(t, zmiany); zlecenieId = t.zlecenieId; } });
  if (zlecenieId && (zmiany.statusPracy || zmiany.stan)) przeliczAktywacje(zlecenieId);
}
function decyzjaXorPodejmij(zlecenieId, bramkaKrokId, przejscieId) {
  bazaMutuj(b => {
    const z = b.zlecenia.find(x => x.id === zlecenieId);
    const proc = z && b.procesy.find(p => p.id === z.procesId);
    // iteracja decyzji = iteracja otwartego tiketu decyzyjnego tej bramki/kroku
    const decTik = b.tikety.filter(t => t.zlecenieId === zlecenieId && t.typ === 'decyzja' && t.krokId === bramkaKrokId && t.statusPracy !== 'zrobione').pop();
    const iter = (decTik && decTik.iteracja) || 1;
    b.decyzjeXor.push({ zlecenieId, bramkaKrokId, wybranePrzejscieId: przejscieId, iteracja: iter, kiedy: new Date().toISOString() });
    if (decTik) decTik.statusPracy = 'zrobione';

    // decyzja pętli "↩ powtórz": klonuj tikety ciała pętli jako iterację n+1
    const pet = proc && proc.przejscia.find(p => p.id === przejscieId && p.petla);
    if (pet) {
      const cialo = _cialoPetli(proc, pet);
      const nowaIter = iter + 1;
      proc.kroki.filter(k => cialo.has(k.id) && (k.typ === 'zadanie' || k.typ === 'koniec')).forEach(k => {
        const wzor = b.tikety.filter(t => t.zlecenieId === zlecenieId && t.typ === 'zadanie' && t.krokId === k.id).pop();
        if (!wzor) return;
        const kopia = JSON.parse(JSON.stringify(wzor));
        kopia.id = uidB(); kopia.iteracja = nowaIter;
        kopia.numer = String(wzor.numer).split('·')[0] + '·' + nowaIter;
        kopia.statusPracy = 'do'; kopia.stan = 'oczekujacy';
        kopia.dowodDolaczony = false; kopia.wykonano = null; delete kopia.powodAnulowania;
        b.tikety.push(kopia);
      });
    }
  });
  przeliczAktywacje(zlecenieId);
}

// ---------- AD HOC ----------
function adhocLista() { return bazaWczytaj().adhoc; }
function adhocDodaj(t) { bazaMutuj(b => b.adhoc.push({ ...t, id: uidB() })); }
function adhocUstaw(id, zmiany) { bazaMutuj(b => { const t = b.adhoc.find(x => x.id === id); if (t) Object.assign(t, zmiany); }); }

// ---------- EKSPORT / IMPORT ----------
function bazaEksport() {
  const b = bazaWczytaj();
  const blob = new Blob([JSON.stringify(b, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `workfly_${new Date().toISOString().slice(0, 10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}
function bazaImport(plik, poImporcie) {
  const r = new FileReader();
  r.onload = () => {
    try {
      const dane = JSON.parse(r.result);
      if (!dane || !Array.isArray(dane.procesy)) { alert('To nie wygląda na plik bazy WORKFLY.'); return; }
      _cache = dane; bazaZapisz();
      if (poImporcie) poImporcie();
    } catch (e) { alert('Nie udało się wczytać pliku: ' + e.message); }
  };
  r.readAsText(plik);
}
function bazaWyczysc() { _cache = MAGAZYN_PUSTY(); bazaZapisz(); }

// hook: re-render przy każdej zmianie bazy (z dowolnego modułu)
function useBaza() {
  const [, setTick] = useState(0);
  useEffect(() => bazaSubskrybuj(() => setTick(t => t + 1)), []);
  return bazaWczytaj();
}

const ModModelowanie = (function() {
// ============================================================
// WORKFLY — makieta UX modelowania procesów (rdzeń uniwersalny)
// v5: 9 poprawek — kolejność po rozgałęzieniu, poziomy layout
// gałęzi, stan ścieżek, niezależność gałęzi, SLA godz/dni,
// "Zbadaj proces" (struktura + sygnały), tryb pełnoekranowy,
// Montserrat, branding WORKFLY + stopka ZMIANOLOGICA.
// PROTOTYP INTERAKCJI — nie narzędzie produkcyjne (brak zapisu).
// ============================================================

const START_STANOWISKA = ["Klient", "Koordynator", "Specjalista", "Kierownik", "Kontrola jakości", "Księgowość"];
const TYPY_DALEJ = [
  { id: "seq", label: "Następny krok", opis: "Po prostu kolejne zadanie, bez warunków. Najczęstszy wybór." },
  { id: "xor", label: "Decyzja — jedna z kilku ścieżek (XOR)", opis: "Idziemy dokładnie jedną drogą. Sam nazywasz ścieżki." },
  { id: "and", label: "Kilka rzeczy równolegle (AND)", opis: "Wszystkie ścieżki naraz. Dalej ruszamy, gdy skończą się wszystkie." },
  { id: "zejscie", label: "Tu ścieżki się schodzą", opis: "Ta gałąź łączy się z istniejącym krokiem." },
  { id: "petla", label: "↩ Powrót do wcześniejszego kroku (pętla)", opis: "Wróć wstecz i powtórz fragment — np. poprawki aż do akceptacji. Tylko po decyzji (XOR)." },
  { id: "koniec", label: "To już koniec procesu", opis: "Ten krok / ta ścieżka daje finalny produkt." },
];

function WorkflyApp() {
  const [zalogowany, setZalogowany] = useState(false);
  const [org, setOrg] = useState("");
  const [user, setUser] = useState("");
  if (!zalogowany) return <Login org={org} setOrg={setOrg} user={user} setUser={setUser} onLogin={() => (org.trim() && user.trim()) && setZalogowany(true)} />;
  return <Studio org={org} user={user} onLogout={() => setZalogowany(false)} />;
}

function Login({ org, setOrg, user, setUser, onLogin }) {
  return (
    <div style={styles.app}>
      <style>{css}</style>
      <div className="login-wrap">
        <div className="login-card">
          <div className="logo-big">WORKFLY</div>
          <div className="haslo">od procesu do efektów</div>
          <p className="login-info">Narzędzie obsługuje wiele organizacji. To logowanie jest pozorne — wpisz cokolwiek.</p>
          <label className="lbl">Organizacja</label>
          <input className="inp" autoFocus value={org} onChange={e => setOrg(e.target.value)} placeholder="np. ZMIANOLOGICA" />
          <label className="lbl">Użytkownik</label>
          <input className="inp" value={user} onChange={e => setUser(e.target.value)} placeholder="np. Marcin" onKeyDown={e => e.key === "Enter" && onLogin()} />
          <button className="btn-primary" style={{ marginTop: 14 }} onClick={onLogin}>Wejdź →</button>
        </div>
      </div>
      <Stopka />
    </div>
  );
}

function Stopka() {
  return <div className="stopka">ZMIANOLOGICA · Dr Marcin Żółtak</div>;
}

function Studio({ org, user, onLogout }) {
  const [procesNazwa, setProcesNazwa] = useState("");
  const [stanowiska, setStanowiska] = useState(START_STANOWISKA);
  const [godzinyStan, setGodzinyStan] = useState({}); // stanowisko -> {od, do}
  const [panelStan, setPanelStan] = useState(false);
  const [kroki, setKroki] = useState([]);
  const [przejscia, setPrzejscia] = useState([]);
  const [otwarte, setOtwarte] = useState([]); // {galazId, bramkaId, etykieta, bramka, pierwszyKrok}

  const [aktywnyProc, setAktywnyProc] = useState(null); // rekord procesu z magazynu (id, rodzinaId, wersja, status)
  const baza = useBaza();
  const [faza, setFaza] = useState("biblioteka"); // biblioteka|nazwa|wybor-sciezki|krok|dalej|gotowe|edycja
  const [ostatniKrok, setOstatniKrok] = useState(null);
  const [biezacyWatek, setBiezacyWatek] = useState(null);
  const [edytowany, setEdytowany] = useState(null);
  const [historia, setHistoria] = useState([]);
  const [pelnyEkran, setPelnyEkran] = useState(false);
  const [raport, setRaport] = useState(null); // wynik "Zbadaj proces"
  const [podpowiedzi, setPodpowiedzi] = useState(true);
  const [widokProcesu, setWidokProcesu] = useState("diagram"); // diagram | tabela
  const [kopie, setKopie] = useState([]); // kopie procesu w sesji (makieta)

  // bufory kroku
  const [kNazwa, setKNazwa] = useState("");
  const [kStanowisko, setKStanowisko] = useState("");
  const [kSla, setKSla] = useState("");
  const [kSlaJedn, setKSlaJedn] = useState("dni"); // dni | godz
  const [kTiketowy, setKTiketowy] = useState(true); // pokaż pracownikowi (T) / niewidoczny (NT)
  const [kWymagaZdjecia, setKWymagaZdjecia] = useState(false); // krok wymaga zdjęcia-dowodu
  const [kLinki, setKLinki] = useState([]);
  // bufory "co dalej"
  const [wyborDalej, setWyborDalej] = useState("seq");
  const [galezie, setGalezie] = useState([{ etykieta: "" }, { etykieta: "" }]);
  const [celZejscia, setCelZejscia] = useState("");
  const [celPetli, setCelPetli] = useState("");
  const [limitPetli, setLimitPetli] = useState("");
  // bufory świeżej bramki (do fazy wybor-sciezki)
  const [swiezeBramkaId, setSwiezeBramkaId] = useState(null);

  const uid = () => Math.random().toString(36).slice(2, 9);
  const numeracja = useMemo(() => buildNumeracja(kroki, przejscia), [kroki, przejscia]);

  // AUTOZAPIS (v6): stan roboczy szkicu trafia do magazynu przy każdej zmianie
  useEffect(() => {
    if (!aktywnyProc || faza === "biblioteka") return;
    procesZapiszSzkic({ ...aktywnyProc, nazwa: procesNazwa || aktywnyProc.nazwa, kroki, przejscia, otwarte });
  }, [kroki, przejscia, procesNazwa, otwarte, aktywnyProc, faza]);
  const walidacja = useMemo(() => waliduj(kroki, przejscia, otwarte), [kroki, przejscia, otwarte]);

  function snapshot() {
    setHistoria(h => [...h.slice(-19), JSON.stringify({ kroki, przejscia, otwarte, ostatniKrok, biezacyWatek, faza, stanowiska, edytowany, swiezeBramkaId })]);
  }
  function cofnij() {
    if (!historia.length) return;
    const s = JSON.parse(historia[historia.length - 1]);
    setKroki(s.kroki); setPrzejscia(s.przejscia); setOtwarte(s.otwarte);
    setOstatniKrok(s.ostatniKrok); setBiezacyWatek(s.biezacyWatek);
    setFaza(s.faza); setStanowiska(s.stanowiska); setEdytowany(s.edytowany || null); setSwiezeBramkaId(s.swiezeBramkaId || null);
    setHistoria(h => h.slice(0, -1)); setRaport(null);
  }

  function zatwierdzNazwe() {
    if (!procesNazwa.trim()) return;
    snapshot();
    if (!aktywnyProc) { const p = procesNowy(procesNazwa.trim()); setAktywnyProc(p); }
    setOstatniKrok(null); setBiezacyWatek(null); setFaza("krok");
  }

  function wczytajProces(p, jakoNowaWersja) {
    const rekord = jakoNowaWersja ? procesNowaWersja(p.id) : p;
    if (!rekord) return;
    setAktywnyProc(rekord);
    setProcesNazwa(rekord.nazwa || "");
    setKroki(rekord.kroki || []); setPrzejscia(rekord.przejscia || []); setOtwarte(rekord.otwarte || []);
    setOstatniKrok(null); setBiezacyWatek(null); setEdytowany(null); setHistoria([]);
    setFaza((rekord.kroki || []).length ? "gotowe" : "krok");
  }
  function nowyProces() {
    setAktywnyProc(null); setProcesNazwa("");
    setKroki([]); setPrzejscia([]); setOtwarte([]);
    setOstatniKrok(null); setBiezacyWatek(null); setEdytowany(null); setHistoria([]);
    setFaza("nazwa");
  }
  function doBiblioteki() { setFaza("biblioteka"); }
  function opublikuj() {
    if (!aktywnyProc || !walidacja.ok || otwarte.length) return;
    procesZapiszSzkic({ ...aktywnyProc, nazwa: procesNazwa, kroki, przejscia, otwarte: [] });
    procesOpublikuj(aktywnyProc.id);
    setAktywnyProc(a => a ? { ...a, status: "opublikowany" } : a);
  }

  function resetBufor() { setKNazwa(""); setKStanowisko(""); setKSla(""); setKSlaJedn("dni"); setKTiketowy(true); setKWymagaZdjecia(false); setKLinki([]); }

  // edycja atrybutu kroku wprost z tabeli (NIE rusza struktury/przejść)
  function edytujAtrybutKroku(id, pole, wartosc) {
    setKroki(ks => ks.map(k => k.id === id ? { ...k, [pole]: wartosc } : k));
    if (pole === "stanowisko" && wartosc.trim() && !stanowiska.includes(wartosc.trim()) && wartosc.trim() !== "Nieprzypisane") {
      setStanowiska(s => [...s, wartosc.trim()]);
    }
  }

  // kopia procesu w pamięci sesji (makieta — nie ma trwałego zapisu)
  function kopiujProces() {
    const nazwa = (procesNazwa || "Proces") + " — kopia";
    setKopie(k => [...k, { nazwa, kroki: JSON.parse(JSON.stringify(kroki)), przejscia: [...przejscia], czas: new Date().toLocaleTimeString("pl-PL", {hour:"2-digit",minute:"2-digit"}) }]);
    alert("Proces skopiowany w tej sesji jako „" + nazwa + "”.\n\nTo makieta — kopia żyje do odświeżenia strony. W realnej aplikacji kopie zapisują się trwale i można je otwierać z listy procesów.");
  }

  function dodajKrok() {
    if (!kNazwa.trim()) return;
    snapshot();
    const st = kStanowisko.trim() || "Nieprzypisane";
    if (st !== "Nieprzypisane" && !stanowiska.includes(st)) setStanowiska(s => [...s, st]);
    const id = uid();
    setKroki(k => [...k, { id, nazwa: kNazwa.trim(), typ: "zadanie", stanowisko: st, sla: kSla.trim(), slaJedn: kSlaJedn, tiketowy: kTiketowy, wymagaZdjecia: kWymagaZdjecia, linki: kLinki.filter(l => l.nazwa.trim()) }]);
    if (ostatniKrok) {
      const etk = biezacyWatek ? biezacyWatek.etykieta : "następny";
      const br = biezacyWatek ? biezacyWatek.bramka : null;
      setPrzejscia(p => [...p, { id: uid(), zrodlo: ostatniKrok, cel: id, etykieta: etk, bramka: br }]);
      // gałąź dostała pierwszy krok → oznacz w rejestrze "w trakcie"
      if (biezacyWatek) setOtwarte(o => o.map(w => w.galazId === biezacyWatek.galazId ? { ...w, pierwszyKrok: id } : w));
    }
    setOstatniKrok(id);
    setBiezacyWatek(bw => bw ? { ...bw, weszlo: true } : null);
    resetBufor();
    setWyborDalej("seq"); setGalezie([{ etykieta: "" }, { etykieta: "" }]); setCelZejscia(""); setCelPetli(""); setLimitPetli("");
    setFaza("dalej");
  }

  function zatwierdzDalej() {
    snapshot();
    if (wyborDalej === "seq") { setFaza("krok"); return; }
    if (wyborDalej === "koniec") {
      setKroki(ks => ks.map(k => k.id === ostatniKrok ? { ...k, typ: "koniec" } : k));
      domknijBiezacaGalaz();
      nastepnyWatek(); return;
    }
    if (wyborDalej === "zejscie") {
      if (celZejscia) setPrzejscia(p => [...p, { id: uid(), zrodlo: ostatniKrok, cel: celZejscia, etykieta: "zejście", bramka: null }]);
      domknijBiezacaGalaz();
      nastepnyWatek(); return;
    }
    if (wyborDalej === "petla") {
      if (celPetli) setPrzejscia(p => [...p, { id: uid(), zrodlo: ostatniKrok, cel: celPetli, etykieta: "↩ powrót", bramka: null, petla: true, limit: limitPetli.trim() ? parseInt(limitPetli) : null }]);
      domknijBiezacaGalaz();
      nastepnyWatek(); return;
    }
    // XOR / AND — tworzymy bramkę, ale NIE wchodzimy od razu w gałąź (poprawka #1)
    const bid = uid();
    setKroki(k => [...k, { id: bid, nazwa: wyborDalej === "xor" ? "Decyzja" : "Rozdzielenie równoległe", typ: "bramka", podtyp: wyborDalej.toUpperCase(), stanowisko: "—", sla: "" }]);
    setPrzejscia(p => [...p, { id: uid(), zrodlo: ostatniKrok, cel: bid, etykieta: "następny", bramka: null }]);
    const watki = galezie.map((g, i) => ({ galazId: uid(), bramkaId: bid, etykieta: g.etykieta.trim() || `Ścieżka ${i + 1}`, bramka: wyborDalej.toUpperCase(), pierwszyKrok: null }));
    setOtwarte(o => [...o, ...watki]);
    setSwiezeBramkaId(bid);
    setBiezacyWatek(null);
    setFaza("wybor-sciezki"); // poprawka #1: najpierw wybór, potem formularz
  }

  // domknij gałąź, którą właśnie skończyliśmy (usuń z otwartych)
  function domknijBiezacaGalaz() {
    if (biezacyWatek) setOtwarte(o => o.filter(w => w.galazId !== biezacyWatek.galazId));
  }

  function wejdzWGalaz(w) {
    snapshot();
    setBiezacyWatek({ bramkaId: w.bramkaId, etykieta: w.etykieta, bramka: w.bramka, galazId: w.galazId, weszlo: false });
    setOstatniKrok(w.bramkaId);
    setEdytowany(null);
    setSwiezeBramkaId(null);
    setFaza("krok");
  }

  function wejdzWGalazZGrafu(etykieta, galazId) {
    const w = otwarte.find(o => o.galazId === galazId) || otwarte.find(o => o.etykieta === etykieta);
    if (w) wejdzWGalaz(w);
  }

  function nastepnyWatek() {
    const akt = biezacyWatek?.galazId;
    const poz = otwarte.filter(o => o.galazId !== akt);
    if (poz.length) { setSwiezeBramkaId(null); setFaza("wybor-sciezki"); }
    else { setBiezacyWatek(null); setOstatniKrok(null); setFaza("gotowe"); }
  }


  function klikKrok(k) {
    if (k.typ === "bramka") return;
    snapshot();
    setEdytowany(k.id);
    setKNazwa(k.nazwa); setKStanowisko(k.stanowisko === "Nieprzypisane" ? "" : k.stanowisko);
    setKSla(k.sla); setKSlaJedn(k.slaJedn || "dni"); setKTiketowy(k.tiketowy !== false); setKWymagaZdjecia(k.wymagaZdjecia === true); setKLinki(k.linki?.length ? [...k.linki] : []);
    setFaza("edycja"); setPelnyEkran(false);
  }
  function zapiszEdycje() {
    if (!kNazwa.trim()) return;
    snapshot();
    const st = kStanowisko.trim() || "Nieprzypisane";
    if (st !== "Nieprzypisane" && !stanowiska.includes(st)) setStanowiska(s => [...s, st]);
    setKroki(ks => ks.map(k => k.id === edytowany ? { ...k, nazwa: kNazwa.trim(), stanowisko: st, sla: kSla.trim(), slaJedn: kSlaJedn, tiketowy: kTiketowy, wymagaZdjecia: kWymagaZdjecia, linki: kLinki.filter(l => l.nazwa.trim()) } : k));
    zakonczEdycje();
  }
  function usunIZastap() {
    const id = edytowany;
    const wej = przejscia.filter(p => p.cel === id);
    const wy = przejscia.filter(p => p.zrodlo === id);
    snapshot();
    let nowe = przejscia.filter(p => p.zrodlo !== id && p.cel !== id);
    if (wej.length && wy.length) wej.forEach(a => wy.forEach(b => nowe.push({ id: uid(), zrodlo: a.zrodlo, cel: b.cel, etykieta: a.etykieta, bramka: a.bramka })));
    setPrzejscia(nowe);
    setKroki(ks => ks.filter(k => k.id !== id));
    setOstatniKrok(wej[0]?.zrodlo || null);
    setBiezacyWatek(null);
    resetBufor(); setEdytowany(null); setFaza("krok");
  }
  function zakonczEdycje() { setEdytowany(null); resetBufor(); setFaza("gotowe"); }

  // #12: kontynuuj proces od istniejącego kroku (z trybu edycji)
  function kontynuujOdEdytowanego() {
    if (!edytowany) return;
    snapshot();
    setOstatniKrok(edytowany);
    setBiezacyWatek(null);
    setEdytowany(null);
    resetBufor();
    setWyborDalej("seq"); setGalezie([{ etykieta: "" }, { etykieta: "" }]); setCelZejscia(""); setCelPetli(""); setLimitPetli("");
    setFaza("dalej");
  }

  function usunKrok(id) {
    snapshot();
    const wej = przejscia.filter(p => p.cel === id);
    const wy = przejscia.filter(p => p.zrodlo === id);
    let nowe = przejscia.filter(p => p.zrodlo !== id && p.cel !== id);
    if (wej.length && wy.length) wej.forEach(a => wy.forEach(b => nowe.push({ id: uid(), zrodlo: a.zrodlo, cel: b.cel, etykieta: a.etykieta, bramka: a.bramka })));
    setPrzejscia(nowe);
    setKroki(ks => ks.filter(k => k.id !== id));
    if (ostatniKrok === id) setOstatniKrok(wej[0]?.zrodlo || null);
    if (edytowany === id) zakonczEdycje();
  }

  function dodajLink() { setKLinki([...kLinki, { nazwa: "", url: "" }]); }
  function zmienLink(i, p, v) { setKLinki(ls => ls.map((l, j) => j === i ? { ...l, [p]: v } : l)); }
  function usunLink(i) { setKLinki(ls => ls.filter((_, j) => j !== i)); }
  function usunGalaz(i) { if (galezie.length > 2) setGalezie(gs => gs.filter((_, j) => j !== i)); }

  function zbadajProces() {
    setRaport(analizujProces(kroki, przejscia, otwarte, numeracja, stanowiska));
  }

  // stan gałęzi w rejestrze (poprawka #3)
  function stanGalezi(w) {
    if (!w.pierwszyKrok) return { etykieta: "pusta", klasa: "stan-pusta" };
    // czy ścieżka domknięta? sprawdź czy ostatni krok ścieżki ma wyjście / koniec
    return { etykieta: "w trakcie", klasa: "stan-wtrakcie" };
  }

  const swiezeBramkaWatki = otwarte.filter(w => w.bramkaId === swiezeBramkaId);
  const watkiDoWyboru = swiezeBramkaId ? swiezeBramkaWatki : otwarte;

  if (pelnyEkran) {
    return (
      <div style={styles.app}>
        <style>{css}</style>
        <header style={styles.header}>
          <div><div className="logo-sm">WORKFLY</div><h1 style={styles.h1}>{procesNazwa || "Nowy proces"}</h1></div>
          <div style={styles.statusBox}>
            <button className="undo" onClick={() => setPelnyEkran(false)}>◖ Wróć do edycji</button>
          </div>
        </header>
        <div style={{ maxWidth: 1320, margin: "0 auto" }}>
          <div style={{ ...styles.canvas, minHeight: 700 }}>
            <div style={styles.panelTitle}>◗ Pełny widok procesu</div>
            {kroki.length === 0 ? <div className="pusto">Brak kroków.</div>
              : <Diagram kroki={kroki} przejscia={przejscia} numeracja={numeracja} otwarte={otwarte} edytowany={null} onKlik={klikKrok} onUsun={usunKrok} onZaslepka={wejdzWGalazZGrafu} />}
          </div>
        </div>
        <Stopka />
      </div>
    );
  }

  return (
    <div style={styles.app} className={podpowiedzi ? "" : "bez-podpowiedzi"}>
      <style>{css}</style>
      <header style={styles.header}>
        <div><div className="logo-sm">WORKFLY · {org} · {user}</div><h1 style={styles.h1}>{procesNazwa || "Nowy proces"}</h1></div>
        <div style={styles.statusBox}>
          <button className="undo" data-tip="Cofnij ostatnią zmianę w projekcie" onClick={cofnij} disabled={!historia.length}>↶ Cofnij</button>
          <span>Kroki: <b>{kroki.filter(k => k.typ !== "bramka").length}</b></span>
          <span style={{ color: walidacja.ok ? "#86b889" : "#fbbf24" }}>{walidacja.ok ? "● domknięty" : `● ${walidacja.problemy.length}`}</span>
          {faza !== "biblioteka" && <button className="undo" onClick={doBiblioteki}>📚 Biblioteka</button>}
          {faza !== "biblioteka" && aktywnyProc && (
            aktywnyProc.status === "opublikowany"
              ? <span className="proc-status proc-pub">● opublikowany v{aktywnyProc.wersja}</span>
              : <button className="undo proc-publikuj" data-tip={!walidacja.ok || otwarte.length ? "Najpierw domknij strukturę (Zbadaj proces)" : "Udostępnij do uruchamiania zleceń"} disabled={!walidacja.ok || otwarte.length > 0} onClick={opublikuj}>▲ Opublikuj v{aktywnyProc.wersja}</button>
          )}
          <button className="undo" data-tip="Słownik stanowisk i godzin pracy — wspólny dla całej organizacji" onClick={() => setPanelStan(true)}>👥 Stanowiska</button>
          <button className="undo" onClick={onLogout}>Wyloguj</button>
        </div>
      </header>

      <div style={styles.grid}>
        {/* LEWA */}
        <div style={styles.panel}>
          <div style={styles.panelTitle}>◖ Projektowanie</div>

          {biezacyWatek && faza !== "edycja" && <div className="biezacy-watek">Domykasz ścieżkę: <b>„{biezacyWatek.etykieta}”</b></div>}

          {faza === "biblioteka" && (
            <Biblioteka baza={baza} onNowy={nowyProces} onOtworz={wczytajProces} />
          )}

          {faza === "nazwa" && (
            <Krok pytanie="Jak nazywa się proces?">
              <input className="inp" autoFocus value={procesNazwa} onChange={e => setProcesNazwa(e.target.value)} placeholder="np. Obsługa reklamacji" onKeyDown={e => e.key === "Enter" && zatwierdzNazwe()} />
              <button className="btn-primary" onClick={zatwierdzNazwe}>Dalej →</button>
            </Krok>
          )}


          {/* poprawka #1: wybór ścieżki PRZED formularzem */}
          {faza === "wybor-sciezki" && (
            <Krok pytanie="Którą ścieżkę teraz opisujesz?" podpowiedz="Wybierz gałąź, którą chcesz poprowadzić. Formularz kroku pojawi się po wyborze.">
              {watkiDoWyboru.map(w => {
                const stan = stanGalezi(w);
                return (
                  <button key={w.galazId} className="wybor-galaz" onClick={() => wejdzWGalaz(w)}>
                    <span className="wg-bramka">{numeracja[w.bramkaId] || "?"} {w.bramka}</span>
                    <span className="wg-etyk">„{w.etykieta}”</span>
                    <span className={"wg-stan " + stan.klasa}>{stan.etykieta}</span>
                  </button>
                );
              })}
            </Krok>
          )}

          {(faza === "krok" || faza === "edycja") && (
            <Krok pytanie={faza === "edycja" ? "Edycja kroku" : (ostatniKrok ? (biezacyWatek ? `Następny krok ścieżki „${biezacyWatek.etykieta}”?` : "Jaki jest następny krok?") : "Jaki jest pierwszy krok procesu?")}>
              <label className="lbl">Nazwa kroku</label>
              <input className="inp" autoFocus value={kNazwa} onChange={e => setKNazwa(e.target.value)} placeholder="np. Rejestracja zgłoszenia" />
              <label className="lbl">Kto wykonuje? <span className="hint">(wybierz lub wpisz nowe)</span></label>
              <input className="inp" list="stanowiska" value={kStanowisko} onChange={e => setKStanowisko(e.target.value)} placeholder="Stanowisko" />
              <datalist id="stanowiska">{stanowiska.map(s => <option key={s} value={s} />)}</datalist>
              <div className="przel-wrap">
                <button className={"przel-btn" + (kTiketowy ? " przel-on" : "")} onClick={() => { const v = !kTiketowy; setKTiketowy(v); if (!v) setKWymagaZdjecia(false); }}>
                  <span className="przel-lampka" />
                  <span className="przel-txt"><b>Zadanie dla pracownika</b><span>{kTiketowy ? "pokazuje się na liście pracownika" : "niewidoczne dla pracownika — krok zostaje w procesie"}</span></span>
                </button>
                <button className={"przel-btn" + (kWymagaZdjecia ? " przel-on przel-on-foto" : "") + (!kTiketowy ? " przel-blok" : "")} disabled={!kTiketowy} title={!kTiketowy ? "Krok niewidoczny dla pracownika — nie ma kto zrobić zdjęcia. Włącz najpierw „Zadanie dla pracownika”." : undefined} onClick={() => kTiketowy && setKWymagaZdjecia(!kWymagaZdjecia)}>
                  <span className="przel-lampka" />
                  <span className="przel-txt"><b>📷 Wymaga zdjęcia-dowodu</b><span>{!kTiketowy ? "niedostępne — krok niewidoczny dla pracownika" : (kWymagaZdjecia ? "nie można domknąć bez dowodu" : "dowód niewymagany")}</span></span>
                </button>
              </div>
              <label className="lbl">Czas realizacji (SLA)</label>
              <div className="sla-row">
                <input className="inp" type="number" min="0" value={kSla} onChange={e => setKSla(e.target.value)} placeholder="np. 2" style={{ flex: 1 }} />
                <div className="jedn-toggle">
                  <button className={kSlaJedn === "godz" ? "jedn-on" : ""} onClick={() => setKSlaJedn("godz")}>godz.</button>
                  <button className={kSlaJedn === "dni" ? "jedn-on" : ""} onClick={() => setKSlaJedn("dni")}>dni</button>
                </div>
              </div>
              <label className="lbl">Zasoby / linki <span className="hint">(dowolny adres)</span></label>
              {kLinki.map((l, i) => (
                <div key={i} className="link-row">
                  <input className="inp inp-sm" style={{ flex: "0 0 38%" }} value={l.nazwa} onChange={e => zmienLink(i, "nazwa", e.target.value)} placeholder="nazwa" />
                  <input className="inp inp-sm" style={{ flex: 1 }} value={l.url} onChange={e => zmienLink(i, "url", e.target.value)} placeholder="https://…" />
                  <button className="x-btn" onClick={() => usunLink(i)}>×</button>
                </div>
              ))}
              <button className="btn-ghost" onClick={dodajLink}>+ dodaj zasób / link</button>
              {faza === "edycja" ? (
                <div className="edycja-akcje">
                  <button className="btn-primary" onClick={zapiszEdycje}>Zapisz zmiany</button>
                  <button className="btn-cont" onClick={kontynuujOdEdytowanego}>➜ Co dalej po tym kroku?</button>
                  <button className="btn-warn" onClick={usunIZastap}>Usuń i zastąp nowym</button>
                  <button className="btn-danger" onClick={() => usunKrok(edytowany)}>Usuń krok</button>
                  <button className="btn-ghost" onClick={zakonczEdycje}>Anuluj</button>
                </div>
              ) : (
                <button className="btn-primary" onClick={dodajKrok}>{ostatniKrok ? "Dodaj krok →" : "Dodaj pierwszy krok →"}</button>
              )}
            </Krok>
          )}

          {faza === "dalej" && (
            <Krok pytanie="Co dzieje się po tym kroku?" podpowiedz={biezacyWatek ? `Opisujesz ścieżkę „${biezacyWatek.etykieta}”. Może mieć własny koniec — nie musi się z niczym łączyć.` : null}>
              {TYPY_DALEJ.map(t => (
                <label key={t.id} className={"radio" + (wyborDalej === t.id ? " radio-on" : "")}>
                  <input type="radio" name="dalej" checked={wyborDalej === t.id} onChange={() => setWyborDalej(t.id)} />
                  <div><div className="radio-label">{t.label}</div><div className="radio-opis">{t.opis}</div></div>
                </label>
              ))}
              {(wyborDalej === "xor" || wyborDalej === "and") && (
                <div className="galezie">
                  <div className="hint" style={{ marginBottom: 6 }}>Nazwij ścieżki:</div>
                  {galezie.map((g, i) => (
                    <div key={i} className="link-row">
                      <input className="inp inp-sm" style={{ flex: 1 }} value={g.etykieta} onChange={e => setGalezie(gs => gs.map((x, j) => j === i ? { etykieta: e.target.value } : x))} placeholder={wyborDalej === "xor" ? `np. „zasadna”` : `ścieżka ${i + 1}`} />
                      <button className="x-btn" disabled={galezie.length <= 2} onClick={() => usunGalaz(i)}>×</button>
                    </div>
                  ))}
                  <button className="btn-ghost" onClick={() => setGalezie([...galezie, { etykieta: "" }])}>+ dodaj ścieżkę</button>
                  {otwarte.length >= 2 && <div className="podpowiedz-soft">💡 Złożoność rośnie ({otwarte.length} otwartych ścieżek). Rozważ podproces — limitu nie ma.</div>}
                </div>
              )}
              {wyborDalej === "zejscie" && (
                <div className="galezie">
                  <label className="lbl">Z którym istniejącym krokiem łączymy?</label>
                  <select className="inp" value={celZejscia} onChange={e => setCelZejscia(e.target.value)}>
                    <option value="">— wybierz —</option>
                    {kroki.filter(k => k.typ !== "bramka" && k.id !== ostatniKrok).map(k => <option key={k.id} value={k.id}>{numeracja[k.id]} · {k.nazwa}</option>)}
                  </select>
                </div>
              )}
              {wyborDalej === "petla" && (
                <div className="galezie">
                  {!biezacyWatek && <div className="podpowiedz-soft">⚠ Pętla powinna wychodzić z gałęzi decyzji (XOR) — inaczej brak warunku wyjścia i pętla jest nieskończona.</div>}
                  <label className="lbl">Wróć do którego wcześniejszego kroku?</label>
                  <select className="inp" value={celPetli} onChange={e => setCelPetli(e.target.value)}>
                    <option value="">— wybierz punkt powrotu —</option>
                    {kroki.filter(k => k.typ !== "bramka" && k.id !== ostatniKrok).map(k => <option key={k.id} value={k.id}>{numeracja[k.id]} · {k.nazwa}</option>)}
                  </select>
                  <label className="lbl" style={{ marginTop: 10 }}>Limit powtórzeń (opcjonalnie)</label>
                  <input className="inp" type="number" min="1" value={limitPetli} onChange={e => setLimitPetli(e.target.value)} placeholder="np. 5 — puste = bez limitu" />
                  <div className="podpowiedz-soft">↩ Cały odcinek od wybranego kroku do tej decyzji powtórzy się. Każde powtórzenie tworzy nowy komplet tiketów (z numerem podejścia).</div>
                </div>
              )}
              <button className="btn-primary" onClick={zatwierdzDalej}>Zatwierdź →</button>
            </Krok>
          )}

          {faza === "gotowe" && (
            <Krok pytanie="Co dalej z procesem?">
              {ostatniKrok && <button className="btn-primary" onClick={() => setFaza("dalej")}>+ Co dalej po tym kroku?</button>}
              <div className="info">▶ Kliknij krok na diagramie, aby go edytować/zastąpić/usunąć. Użyj „Zbadaj proces”, by sprawdzić logikę.</div>
            </Krok>
          )}

          {/* rejestr otwartych ścieżek ze stanem (poprawka #3) */}
          {otwarte.length > 0 && (
            <div className="rejestr">
              <div className="rejestr-head">⚠ Otwarte ścieżki ({otwarte.length})</div>
              {otwarte.map(w => {
                const stan = stanGalezi(w);
                return (
                  <button key={w.galazId} className={"rejestr-item" + (biezacyWatek?.galazId === w.galazId ? " rejestr-aktywny" : "")} onClick={() => wejdzWGalaz(w)}>
                    <span className="rejestr-bramka">{numeracja[w.bramkaId] || "?"} {w.bramka}</span>
                    <span className="rejestr-etykieta">„{w.etykieta}”</span>
                    <span className={"wg-stan " + stan.klasa}>{stan.etykieta}</span>
                  </button>
                );
              })}
            </div>
          )}
        </div>

        {/* PRAWA */}
        <div style={styles.canvas}>
          <div style={styles.panelTitle}>
            ◗ Wizualny proces
            <span className="canvas-akcje">
              <span className="widok-przel">
                <button className={widokProcesu === "diagram" ? "wp-on" : ""} data-tip="Widok graficzny — przepływ procesu ze strzałkami" onClick={() => setWidokProcesu("diagram")}>Diagram</button>
                <button className={widokProcesu === "tabela" ? "wp-on" : ""} data-tip="Widok tabeli — szybka edycja danych kroków (nazwa, T/NT, stanowisko, SLA)" onClick={() => setWidokProcesu("tabela")} disabled={!kroki.length}>Tabela</button>
              </span>
              <button className="mini-btn" data-tip="Stwórz kopię procesu, by eksperymentować bez ruszania oryginału" onClick={kopiujProces} disabled={!kroki.length}>⧉ Kopiuj proces</button>
              <button className="mini-btn" data-tip="Sprawdź logikę: błędy struktury i sygnały do rozważenia" onClick={zbadajProces} disabled={!kroki.length}>🔍 Zbadaj proces</button>
              <button className="mini-btn" data-tip="Pokaż sam diagram na całym ekranie" onClick={() => setPelnyEkran(true)} disabled={!kroki.length}>⛶ Pełny ekran</button>
            </span>
          </div>
          {kroki.length === 0 ? <div className="pusto">Diagram zbuduje się tu w trakcie projektowania →</div>
            : widokProcesu === "tabela"
              ? <TabelaKrokow kroki={kroki} numeracja={numeracja} stanowiska={stanowiska} onEdytuj={edytujAtrybutKroku} onKlik={klikKrok} />
              : <Diagram kroki={kroki} przejscia={przejscia} numeracja={numeracja} otwarte={otwarte} edytowany={edytowany} onKlik={klikKrok} onUsun={usunKrok} onZaslepka={wejdzWGalazZGrafu} />}

          {raport && <RaportBadania raport={raport} onZamknij={() => setRaport(null)} />}

          {kroki.length > 0 && !raport && (
            <div className={"walid " + (walidacja.ok ? "walid-ok" : "walid-warn")}>
              <div className="walid-head">{walidacja.ok ? "✓ Struktura domknięta" : "Sygnały struktury:"}</div>
              {walidacja.problemy.map((p, i) => <div key={i} className="walid-item">• {p}</div>)}
            </div>
          )}
        </div>
      </div>
      <div className="dol-pasek">
        <label className="podp-suwak">
          <input type="checkbox" checked={podpowiedzi} onChange={e => setPodpowiedzi(e.target.checked)} />
          <span className="podp-track"><span className="podp-galka" /></span>
          <span className="podp-label">Podpowiedzi {podpowiedzi ? "wł." : "wył."}</span>
        </label>
      </div>
      <Stopka />
    </div>
  );
}

// ---------------- RAPORT "ZBADAJ PROCES" (poprawka #6) ----------------
function RaportBadania({ raport, onZamknij }) {
  return (
    <div className="raport">
      <div className="raport-head">
        <span>🔍 Wynik badania procesu</span>
        <button className="x-btn" onClick={onZamknij}>×</button>
      </div>
      <div className="raport-sekcja">
        <div className="raport-tytul raport-blad">● Błędy struktury — do naprawienia</div>
        {raport.bledy.length === 0 ? <div className="raport-ok">✓ Brak błędów strukturalnych.</div>
          : raport.bledy.map((b, i) => <div key={i} className="raport-item raport-item-blad">• {b}</div>)}
      </div>
      <div className="raport-sekcja">
        <div className="raport-tytul raport-sygnal">● Sygnały sensowności — do rozważenia</div>
        <div className="raport-disc">To podpowiedzi, nie błędy. Mogą być uzasadnione — oceń sam.</div>
        {raport.sygnaly.length === 0 ? <div className="raport-ok">✓ Brak sygnałów.</div>
          : raport.sygnaly.map((s, i) => <div key={i} className="raport-item raport-item-sygnal">• {s}</div>)}
      </div>
    </div>
  );
}

function Krok({ pytanie, podpowiedz, children }) {
  return (<div className="krok-kreatora"><div className="krok-pytanie">{pytanie}</div>{podpowiedz && <div className="krok-podpowiedz">{podpowiedz}</div>}<div className="krok-pola">{children}</div></div>);
}

// ---------------- DIAGRAM z poziomym layoutem gałęzi (poprawka #2) ----------------
// Tabela kroków — edycja atrybutów w miejscu (NIE struktury/przejść)
function Biblioteka({ baza, onNowy, onOtworz }) {
  const importRef = useRef(null);
  const grupy = {};
  baza.procesy.forEach(p => { (grupy[p.rodzinaId] = grupy[p.rodzinaId] || []).push(p); });
  const rodziny = Object.values(grupy).map(ws => ws.sort((a, b) => b.wersja - a.wersja));
  const STATUS_ET = { szkic: ['szkic — w budowie', 'bib-szkic'], opublikowany: ['opublikowany', 'bib-pub'], wycofany: ['wycofany (obsługuje stare zlecenia)', 'bib-wyc'], archiwum: ['archiwum', 'bib-arch'] };
  return (
    <Krok pytanie="Biblioteka procesów" podpowiedz="Kontynuuj szkic, otwórz opublikowany do zmian (utworzy nową wersję) albo zacznij od zera.">
      <button className="btn-primary" onClick={onNowy}>+ Nowy proces</button>
      {rodziny.length === 0 && <div className="info">Brak zapisanych procesów. Zacznij od „Nowy proces".</div>}
      {rodziny.map(ws => (
        <div key={ws[0].rodzinaId} className="bib-rodzina">
          <div className="bib-nazwa">{ws[0].nazwa}</div>
          {ws.map(p => {
            const [et, kl] = STATUS_ET[p.status] || [p.status, ''];
            return (
              <div key={p.id} className="bib-wersja">
                <span className={"bib-status " + kl}>v{p.wersja} · {et}</span>
                <span className="bib-akcje">
                  {p.status === "szkic" && <>
                    <button className="btn-ghost btn-sm" onClick={() => onOtworz(p, false)}>Kontynuuj</button>
                    <button className="btn-ghost btn-sm" onClick={() => { if (window.confirm("Usunąć ten szkic?")) procesSzkicUsun(p.id); }}>Usuń</button>
                  </>}
                  {p.status === "opublikowany" && <button className="btn-ghost btn-sm" onClick={() => onOtworz(p, true)}>Edytuj → nowa wersja</button>}
                  {p.status === "wycofany" && <span className="bib-hint">zarchiwizuje się po ostatnim zleceniu</span>}
                  {p.status === "archiwum" && <button className="btn-ghost btn-sm" onClick={() => { if (window.confirm("Usunąć trwale z archiwum? Zlecenia historyczne stracą odniesienie do definicji.")) procesUsunZArchiwum(p.id); }}>Usuń z archiwum</button>}
                </span>
              </div>
            );
          })}
        </div>
      ))}
      <div className="bib-stopka">
        <button className="btn-ghost btn-sm" onClick={bazaEksport}>⬇ Eksportuj bazę (.json)</button>
        <button className="btn-ghost btn-sm" onClick={() => importRef.current && importRef.current.click()}>⬆ Importuj bazę</button>
        <input ref={importRef} type="file" accept=".json,application/json" style={{ display: "none" }}
          onChange={e => { const f = e.target.files && e.target.files[0]; if (f && window.confirm("Import ZASTĄPI całą obecną bazę zawartością pliku. Kontynuować?")) bazaImport(f); e.target.value = ""; }} />
        <span className="bib-hint">Baza żyje w tej przeglądarce — eksport to Twój backup i sposób przekazania danych.</span>
      </div>
    </Krok>
  );
}

function TabelaKrokow({ kroki, numeracja, stanowiska, onEdytuj, onKlik }) {
  const zadania = kroki.filter(k => k.typ === "zadanie");
  if (!zadania.length) return <div className="pusto">Brak kroków-zadań do pokazania w tabeli. Bramki i punkty start/koniec edytuje się na diagramie.</div>;
  return (
    <div className="tabela-krokow">
      <div className="tk-info">Edytujesz dane kroków-zadań. Przepływ (kolejność, bramki, ścieżki) zmienia się tylko na diagramie — tu go nie ruszasz.</div>
      <div className="tk-naglowek">
        <span className="tk-c-nr">Nr</span>
        <span className="tk-c-nazwa">Zadanie</span>
        <span className="tk-c-tnt">T/NT</span>
        <span className="tk-c-stan">Stanowisko</span>
        <span className="tk-c-sla">SLA</span>
      </div>
      {zadania.map(k => (
        <div key={k.id} className="tk-wiersz">
          <span className="tk-c-nr tk-nr">{numeracja[k.id] || "—"}</span>
          <input className="tk-c-nazwa tk-inp" value={k.nazwa} onChange={e => onEdytuj(k.id, "nazwa", e.target.value)} />
          <span className="tk-c-tnt">
            <button className={"tk-tnt " + (k.tiketowy !== false ? "tk-t" : "tk-nt")} onClick={() => { const v = k.tiketowy === false; onEdytuj(k.id, "tiketowy", v); if (!v) onEdytuj(k.id, "wymagaZdjecia", false); }} title={k.tiketowy !== false ? "Widoczne dla pracownika — kliknij, by ukryć" : "Ukryte przed pracownikiem — kliknij, by pokazać"}>
              {k.tiketowy !== false ? "widoczny" : "ukryty"}
            </button>
            <button className={"tk-foto " + (k.wymagaZdjecia ? "tk-foto-on" : "") + (k.tiketowy === false ? " tk-foto-blok" : "")} disabled={k.tiketowy === false} onClick={() => k.tiketowy !== false && onEdytuj(k.id, "wymagaZdjecia", !k.wymagaZdjecia)} title={k.tiketowy === false ? "Krok niewidoczny dla pracownika — dowód niedostępny" : (k.wymagaZdjecia ? "Wymaga zdjęcia-dowodu" : "Dowód niewymagany")}>📷</button>
          </span>
          <input className="tk-c-stan tk-inp" list="stanowiska-tab" value={k.stanowisko || ""} onChange={e => onEdytuj(k.id, "stanowisko", e.target.value)} />
          <span className="tk-c-sla tk-sla-wrap">
            <input className="tk-inp tk-sla" type="number" min="0" value={k.sla || ""} onChange={e => onEdytuj(k.id, "sla", e.target.value)} />
            <button className="tk-jedn" onClick={() => onEdytuj(k.id, "slaJedn", (k.slaJedn || "dni") === "dni" ? "godz" : "dni")}>{k.slaJedn || "dni"}</button>
          </span>
        </div>
      ))}
      <datalist id="stanowiska-tab">{stanowiska.map(s => <option key={s} value={s} />)}</datalist>
    </div>
  );
}

function Diagram({ kroki, przejscia, numeracja, otwarte, edytowany, onKlik, onUsun, onZaslepka }) {
  const wrapRef = useRef(null);
  const nodeRefs = useRef({});
  const [linie, setLinie] = useState([]);

  // płaski układ rzędów (v6): sekwencja w dół, dzieci bramki obok siebie.
  const rzedy = useMemo(() => buildUklad(kroki, przejscia, otwarte), [kroki, przejscia, otwarte]);

  useLayoutEffect(() => {
    const wrap = wrapRef.current;
    if (!wrap) return;
    const wr = wrap.getBoundingClientRect();
    const nowe = [];
    // realne przejścia (pętle pomijamy — pokazujemy je jako znaczniki, nie linie)
    przejscia.forEach(p => {
      if (p.petla) return;
      const a = nodeRefs.current[p.zrodlo], b = nodeRefs.current[p.cel];
      if (!a || !b) return;
      const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
      nowe.push({ id: p.id, x1: ra.left - wr.left + ra.width / 2, y1: ra.bottom - wr.top, x2: rb.left - wr.left + rb.width / 2, y2: rb.top - wr.top, etykieta: p.etykieta, bramka: p.bramka });
    });
    // strzałki bramka -> zaślepka (puste ścieżki)
    otwarte.forEach(w => {
      const maRealne = przejscia.some(p => p.zrodlo === w.bramkaId && p.etykieta === w.etykieta);
      if (maRealne) return;
      const a = nodeRefs.current[w.bramkaId], b = nodeRefs.current["z_" + w.galazId];
      if (!a || !b) return;
      const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
      nowe.push({ id: "ez_" + w.galazId, x1: ra.left - wr.left + ra.width / 2, y1: ra.bottom - wr.top, x2: rb.left - wr.left + rb.width / 2, y2: rb.top - wr.top, etykieta: w.etykieta, bramka: w.bramka });
    });
    setLinie(nowe);
  }, [rzedy, otwarte, edytowany, numeracja]);

  return (
    <div className="diagram" ref={wrapRef}>
      <svg className="diagram-svg">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#475569" />
          </marker>
        </defs>
        {(() => {
          // rozsuń starty krawędzi wychodzących z tego samego źródła (gałęzie bramki)
          const grupy = {};
          linie.forEach(l => { (grupy[Math.round(l.x1) + "_" + Math.round(l.y1)] = grupy[Math.round(l.x1) + "_" + Math.round(l.y1)] || []).push(l); });
          Object.values(grupy).forEach(g => {
            if (g.length < 2) return;
            g.sort((a, b) => a.x2 - b.x2);
            const krok = 18, start = -((g.length - 1) * krok) / 2;
            g.forEach((l, i) => { l.x1o = l.x1 + start + i * krok; });
          });
          return linie.map(l => {
            const x1 = l.x1o !== undefined ? l.x1o : l.x1;
            const x2 = l.x2, y2k = l.y2 - 2;          // 2px luzu nad ramką celu
            const yPoz = Math.max(l.y1 + 8, l.y2 - 16); // poziomy odcinek w przerwie tuż nad celem
            const r = Math.min(10, Math.abs(x2 - x1) / 2, Math.max(1, (y2k - yPoz)));
            const s = x2 > x1 ? 1 : -1;
            const d = Math.abs(x2 - x1) < 4
              ? `M ${x1} ${l.y1} L ${x1} ${y2k}`
              : `M ${x1} ${l.y1} L ${x1} ${yPoz - r} Q ${x1} ${yPoz} ${x1 + s * r} ${yPoz} L ${x2 - s * r} ${yPoz} Q ${x2} ${yPoz} ${x2} ${yPoz + r} L ${x2} ${y2k}`;
            return (
              <g key={l.id}>
                <path d={d} fill="none" stroke={l.bramka ? "#b08442" : "#475569"} strokeWidth="2" markerEnd="url(#arr)" />
                {l.bramka && (
                  <foreignObject x={(x1 + x2) / 2 - 45} y={yPoz - 22} width="90" height="20">
                    <div className="edge-label">{l.etykieta}</div>
                  </foreignObject>
                )}
              </g>
            );
          });
        })()}
      </svg>

      <div className="diagram-tresc">
        <div className="d-body">
          {rzedy.map((rzad, ri) => (
            <div key={ri} className="d-rzad">
                    {rzad.map(k => {
                      if (k.typ === "zaslepka") {
                        return (
                          <div key={k.id} ref={el => nodeRefs.current[k.id] = el}
                            className="d-node d-zaslepka"
                            onClick={() => onZaslepka && onZaslepka(k.etykieta, k.id.replace(/^z_/, ""))}
                            title="Pusta ścieżka — kliknij, aby opisać">
                            <div className="d-top"><span className="d-tag d-tag-pusta">DO OPISANIA</span></div>
                            <div className="d-name d-name-pusta">„{k.etykieta}”</div>
                            <div className="d-zaslepka-hint">kliknij, aby dodać pierwszy krok</div>
                          </div>
                        );
                      }
                      const otw = k.typ === "bramka" && otwarte.some(o => o.bramkaId === k.id);
                      return (
                        <div key={k.id} ref={el => nodeRefs.current[k.id] = el}
                          className={"d-node " + (k.typ === "bramka" ? "d-bramka" : k.typ === "koniec" ? "d-koniec" : "d-zadanie") + (otw ? " d-otwarty" : "") + (edytowany === k.id ? " d-edytowany" : "")}
                          onClick={() => onKlik(k)} title={k.typ === "bramka" ? "Bramkę edytujesz przez gałęzie" : "Kliknij, aby edytować"}>
                          {k.typ !== "bramka" && <button className="x-btn x-node" onClick={(e) => { e.stopPropagation(); onUsun(k.id); }}>×</button>}
                          <div className="d-top">
                            <span className="d-num">{numeracja[k.id] || "?"}</span>
                            {k.typ === "bramka" ? <span className="d-tag d-tag-br">{k.podtyp}</span>
                              : k.typ === "koniec" ? <span className="d-tag d-tag-end">KONIEC</span>
                              : <span className="d-tag">{k.stanowisko}{k.tiketowy === false ? " · ukryty" : ""}</span>}
                          </div>
                          <div className="d-name">{k.nazwa}</div>
                          {k.typ === "zadanie" && (k.sla || k.linki?.length > 0 || k.wymagaZdjecia) && (
                            <div className="d-meta">{k.sla && <span>🕒 {k.sla} {k.slaJedn || "dni"}</span>}{k.linki?.length > 0 && <span>🔗 {k.linki.length}</span>}{k.wymagaZdjecia && <span className="d-foto">📷 dowód</span>}</div>
                          )}
                          {/* znacznik: ten krok wraca wstecz (źródło pętli) */}
                          {przejscia.filter(p => p.petla && p.zrodlo === k.id).map(p => (
                            <button key={p.id} className="d-petla d-petla-zrodlo" onClick={(e) => { e.stopPropagation(); const t = nodeRefs.current[p.cel]; if (t) { t.scrollIntoView({ behavior: "smooth", block: "center" }); t.classList.add("d-podswietl"); setTimeout(() => t.classList.remove("d-podswietl"), 1500); } }}>
                              ↩ wraca do: {(kroki.find(x => x.id === p.cel) || {}).nazwa || numeracja[p.cel]}{p.limit ? ` · max ${p.limit}×` : ""}
                            </button>
                          ))}
                          {/* znacznik: ten krok jest punktem powrotu pętli */}
                          {przejscia.some(p => p.petla && p.cel === k.id) && (
                            <div className="d-petla d-petla-cel">↩ punkt powrotu pętli</div>
                          )}
                        </div>
                      );
                    })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// układ rzędów: sekwencja w dół, WSZYSTKIE gałęzie bramki w jednym rzędzie obok siebie.
// Puste ścieżki (otwarte wątki bez kroku) dostają wirtualne węzły-zaślepki, by graf
// pokazywał rozgałęzienie od razu i wyrównywał rodzeństwo (#10, #11).
function buildUklad(kroki, przejscia, otwarte = []) {
  // v6: jeden płaski układ rzędów (bez grupowania w etapy).
  // sekwencja w dół, WSZYSTKIE gałęzie bramki w jednym rzędzie obok siebie.
  const ke = kroki;
  if (!ke.length) return [];
  const byId = Object.fromEntries(ke.map(k => [k.id, k]));
  // zaślepki dla otwartych ścieżek bramki bez pierwszego kroku
  const zaslepki = {}; // bramkaId -> [ {id, typ:'zaslepka', etykieta, bramka} ]
  otwarte.filter(w => byId[w.bramkaId]).forEach(w => {
    const maRealne = przejscia.some(p => p.zrodlo === w.bramkaId && p.etykieta === w.etykieta && byId[p.cel]);
    if (!maRealne) {
      (zaslepki[w.bramkaId] = zaslepki[w.bramkaId] || []).push({ id: "z_" + w.galazId, typ: "zaslepka", nazwa: w.etykieta, etykieta: w.etykieta, bramka: w.bramka });
    }
  });

  const rzedy = [];
  const odwiedzone = new Set();
  const wejWewn = id => przejscia.some(p => p.cel === id && byId[p.zrodlo]);
  let start = ke.find(k => !wejWewn(k.id)) || ke[0];

  let kolejka = [start];
  while (kolejka.length) {
    kolejka = kolejka.filter(k => k && !odwiedzone.has(k.id));
    if (!kolejka.length) break;
    kolejka.forEach(k => odwiedzone.add(k.id));
    rzedy.push(kolejka);
    const nast = [];
    kolejka.forEach(k => {
      przejscia.filter(p => p.zrodlo === k.id && byId[p.cel]).forEach(p => {
        if (!odwiedzone.has(p.cel) && !nast.find(x => x.id === p.cel)) nast.push(byId[p.cel]);
      });
      if (zaslepki[k.id]) zaslepki[k.id].forEach(z => { if (!nast.find(x => x.id === z.id)) nast.push(z); });
    });
    kolejka = nast;
  }
  ke.forEach(k => { if (!odwiedzone.has(k.id)) rzedy.push([k]); });
  return rzedy;
}

function buildNumeracja(kroki, przejscia) {
  // numeracja sekwencyjna z gałęziami (v6, bez etapów):
  // ciąg główny 1,2,3...; gałąź bramki dostaje literę przy numerze bramki (2a,2b);
  // kolejne kroki w gałęzi: 2a.1, 2a.2
  const num = {};
  let lic = 0;
  kroki.forEach(k => {
    const wej = przejscia.find(p => p.cel === k.id && p.bramka);
    if (wej) {
      const bn = num[wej.zrodlo] || "?";
      const rodz = przejscia.filter(p => p.zrodlo === wej.zrodlo);
      const idx = rodz.findIndex(p => p.cel === k.id);
      num[k.id] = `${bn}${String.fromCharCode(97 + Math.max(0, idx))}`;
    } else {
      // krok w gałęzi (wejście nie-bramkowe ze źródła mającego numer literowy)?
      const wejSeq = przejscia.find(p => p.cel === k.id && !p.bramka && !p.petla);
      const src = wejSeq && num[wejSeq.zrodlo];
      if (src && /[a-z]/.test(src)) {
        // kontynuacja gałęzi: dolicz .N
        const baza = src.replace(/\.(\d+)$/, "");
        const ile = Object.values(num).filter(v => v.startsWith(baza + ".")).length;
        num[k.id] = `${baza}.${ile + 1}`;
      } else { lic++; num[k.id] = `${lic}`; }
    }
  });
  return num;
}

function waliduj(kroki, przejscia, otwarte) {
  const p = [];
  if (kroki.length === 0) return { ok: false, problemy: ["Brak kroków."] };
  if (otwarte.length) p.push(`${otwarte.length} otwartych ścieżek do domknięcia.`);
  if (!kroki.some(k => k.typ === "koniec")) p.push("Brak kroku końcowego (finalny produkt).");
  kroki.forEach(k => { if (k.typ === "bramka" && przejscia.filter(x => x.zrodlo === k.id).length < 2) p.push(`Bramka „${k.nazwa}” ma < 2 wyjścia.`); });
  kroki.filter(k => k.typ === "zadanie" && k.stanowisko === "Nieprzypisane").forEach(k => p.push(`„${k.nazwa}” bez stanowiska.`));
  return { ok: p.length === 0, problemy: p };
}

// "Zbadaj proces" — poziom 1 (błędy) + poziom 2 (sygnały heurystyczne)
function analizujProces(kroki, przejscia, otwarte, numeracja, stanowiska) {
  const bledy = [];
  const sygnaly = [];
  const zadania = kroki.filter(k => k.typ === "zadanie" || k.typ === "koniec");

  // --- POZIOM 1: struktura ---
  if (otwarte.length) bledy.push(`${otwarte.length} ścieżek nie jest domkniętych — każda musi prowadzić do końca, zejścia lub innego kroku.`);
  if (!kroki.some(k => k.typ === "koniec")) bledy.push("Proces nie ma żadnego kroku końcowego.");
  kroki.forEach(k => {
    if (k.typ === "bramka") {
      const wy = przejscia.filter(x => x.zrodlo === k.id);
      if (wy.length < 2) bledy.push(`Bramka ${numeracja[k.id]} „${k.nazwa}” ma mniej niż 2 wyjścia.`);
    }
  });
  zadania.filter(k => k.stanowisko === "Nieprzypisane").forEach(k => bledy.push(`Krok ${numeracja[k.id]} „${k.nazwa}” nie ma przypisanego stanowiska.`));
  kroki.filter(k => k.tiketowy === false && k.wymagaZdjecia).forEach(k => bledy.push(`Krok ${numeracja[k.id]} „${k.nazwa}”: wymaga zdjęcia-dowodu, ale jest niewidoczny dla pracownika — nie ma kto zrobić zdjęcia. Wyłącz dowód albo włącz „Zadanie dla pracownika”.`));
  // kroki osierocone (poza pierwszym): brak wejścia
  kroki.forEach(k => {
    const maWej = przejscia.some(p => p.cel === k.id);
    const maWy = przejscia.some(p => p.zrodlo === k.id);
    if (!maWej && !maWy && kroki.length > 1) bledy.push(`Krok ${numeracja[k.id]} „${k.nazwa}” jest oderwany — nic do niego nie prowadzi i nic z niego nie wychodzi.`);
  });

  // --- POZIOM 2: sygnały sensowności (3 przykładowe reguły) ---
  // 1) brak SLA
  const bezSla = zadania.filter(k => !k.sla);
  if (bezSla.length) sygnaly.push(`${bezSla.length} kroków nie ma określonego czasu (SLA) — bez tego nie policzysz terminów zlecenia.`);
  // 2) wąskie gardło: jedno stanowisko na większości kroków
  const licznik = {};
  zadania.forEach(k => { licznik[k.stanowisko] = (licznik[k.stanowisko] || 0) + 1; });
  const max = Object.entries(licznik).sort((a, b) => b[1] - a[1])[0];
  if (max && zadania.length >= 4 && max[1] / zadania.length > 0.6) sygnaly.push(`Stanowisko „${max[0]}” wykonuje ${max[1]} z ${zadania.length} kroków — możliwe wąskie gardło. Rozważ podział odpowiedzialności.`);
  // 3) długi proces bez decyzji
  const maBramke = kroki.some(k => k.typ === "bramka");
  if (zadania.length >= 8 && !maBramke) sygnaly.push(`Proces ma ${zadania.length} kroków i żadnego punktu decyzyjnego — czy na pewno nigdzie nic się nie rozgałęzia ani nie wymaga sprawdzenia?`);

  // --- PĘTLE (sekcja 4.4) ---
  const petle = przejscia.filter(p => p.petla);
  petle.forEach(p => {
    // cel musi istnieć
    if (!kroki.some(k => k.id === p.cel)) {
      bledy.push(`Pętla z kroku ${numeracja[p.zrodlo] || "?"} wraca do nieistniejącego kroku.`);
      return;
    }
    // źródło pętli powinno wychodzić z gałęzi decyzji (XOR): krok-źródło ma wejście od bramki XOR
    const zrodloMaWejscieZXor = przejscia.some(x => x.cel === p.zrodlo && x.bramka === "XOR")
      || kroki.some(k => k.typ === "bramka" && k.podtyp === "XOR" && przejscia.some(x => x.zrodlo === k.id));
    if (!zrodloMaWejscieZXor) {
      bledy.push(`Pętla z kroku ${numeracja[p.zrodlo] || "?"} nie wychodzi z decyzji (XOR) — brak warunku wyjścia, pętla może być nieskończona.`);
    }
    // bez limitu — sygnał
    if (!p.limit) {
      sygnaly.push(`Pętla wracająca do ${numeracja[p.cel] || "kroku"} nie ma ustawionego limitu powtórzeń — rozważ limit, by uniknąć nieskończonego powtarzania.`);
    }
  });

  return { bledy, sygnaly };
}
