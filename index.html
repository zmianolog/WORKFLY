    }
    setUruchomione(true); setKrok(5);
  }

  const mozeDalej = krok === 1 ? true : krok === 2 ? klient.trim() !== '' : true;

  return (
    <div style={styles.app} className={podpowiedzi ? "" : "bez-podpowiedzi"}>
      <style>{css}</style>
      <header style={styles.header}>
        <div><div className="logo">WORKFLY</div><div className="podtytul">Uruchomienie zlecenia</div></div>
        <div className="kroki-wskaznik">
          {['Proces', 'Dane', 'Podgląd + dokumenty', 'Przypisanie'].map((nazwa, i) => (
            <div key={i} className={"krok-pkt" + (krok === i + 1 ? ' aktywny' : krok > i + 1 ? ' zrobiony' : '')} data-tip={podpowiedzi ? OPISY_KROKOW[i] : undefined}>
              <span className="krok-num">{krok > i + 1 ? '✓' : i + 1}</span>{nazwa}
            </div>
          ))}
        </div>
      </header>

      <div style={styles.tresc}>
        {/* KROK 1 — wybór procesu */}
        {krok === 1 && (
          <div className="panel">
            <h2>Wybierz proces do uruchomienia</h2>
            <p className="opis">Z procesu powstanie zlecenie — konkretna realizacja dla klienta, z własnymi tiketami i terminami.</p>
            {opublikowane.length === 0 && (
              <div className="proces-karta wygaszona">Brak opublikowanych procesów w bazie. Przejdź do modułu „Modelowanie", zbuduj proces i kliknij „Opublikuj" — pojawi się tutaj.<br/><span style={{fontSize:11,opacity:0.7}}>Poniżej demo (Loxone) — uruchomienie z demo nie zapisze się do bazy.</span></div>
            )}
            {opublikowane.map(p => (
              <div key={p.id} className={"proces-karta" + (wybranyId === p.id ? " wybrana" : "")} onClick={() => setWybranyId(p.id)} style={{cursor:'pointer'}}>
                <div className="proces-nazwa">{p.nazwa}</div>
                <div className="proces-meta">{p.kroki.length} kroków · wersja {p.wersja} · opublikowany</div>
              </div>
            ))}
            {opublikowane.length === 0 && (
              <div className={"proces-karta" + (wybranyId === '__demo__' ? " wybrana" : "")} onClick={() => setWybranyId('__demo__')} style={{cursor:'pointer'}}>
                <div className="proces-nazwa">{PROCES.nazwa} <span style={{fontSize:11,opacity:0.6}}>(demo)</span></div>
                <div className="proces-meta">{PROCES.kroki.length} kroków · wersja 1</div>
              </div>
            )}
            <button className="btn-primary" disabled={!wybranyId} onClick={() => setKrok(2)}>Dalej →</button>
          </div>
        )}

        {/* KROK 2 — dane zlecenia */}
        {krok === 2 && (
          <div className="panel">
            <h2>Dane zlecenia</h2>
            <div className="form-grid">
              <div className="pole szer2">
                <label>Klient *</label>
                <input value={klient} onChange={e => setKlient(e.target.value)} placeholder="np. Kowalski / dom Sopot" autoFocus />
              </div>
              <div className="pole">
                <label>Numer zlecenia <span className="hint">(nadany automatycznie)</span></label>
                <input value={nrZlecenia} disabled className="disabled" data-tip="Numer nadawany automatycznie przez system — można go nadpisać w realnej aplikacji" />
              </div>
              <div className="pole">
                <label>Data startu</label>
                <input type="date" value={dataStart} onChange={e => setDataStart(e.target.value)} />
              </div>
              <div className="pole">
                <label>Priorytet</label>
                <select value={priorytet} onChange={e => setPriorytet(e.target.value)}>
                  <option value="niski">Niski</option>
                  <option value="normalny">Normalny</option>
                  <option value="wysoki">Wysoki</option>
                  <option value="krytyczny">Krytyczny</option>
                </select>
              </div>
              <div className="pole">
                <label>Wartość (opcjonalnie)</label>
                <input value={wartosc} onChange={e => setWartosc(e.target.value)} placeholder="np. 4 500 zł" />
              </div>
              <div className="pole szer2">
                <label>Opiekun zlecenia (PM)</label>
                <input value={pm} onChange={e => setPm(e.target.value)} placeholder="np. Tomek L." />
              </div>
            </div>
            <div className="nawigacja">
              <button className="btn-ghost" onClick={() => setKrok(1)}>← Wstecz</button>
              <button className="btn-primary" disabled={!klient.trim()} onClick={() => setKrok(3)}>Dalej →</button>
            </div>
          </div>
        )}

        {/* KROK 3 — podgląd tiketów */}
        {krok === 3 && (
          <div className="panel">
            <h2>Podgląd: co powstanie z tego zlecenia</h2>
            <p className="opis">System utworzy tiket z każdego kroku-zadania. T — widoczny dla pracownika; NT — niewidoczny dla pracownika (zdarzenie zewnętrzne odhacza zarządzający na kokpicie). Tu możesz podpiąć dokumenty specyficzne dla tego zlecenia do konkretnych tiketów (linki — plany, materiały od klienta). Do tiketów warunkowych dokumenty podepniesz, gdy ścieżka się ziści (z kokpitu).</p>
            <div className="legenda">
              <span className="lg lg-t">T — tiket dla pracownika</span>
              <span className="lg lg-nt">NT — tiket niewidoczny dla pracownika (odhacza zarządzający)</span>
              <span className="lg lg-war">warunkowy — zależy od decyzji</span>
            </div>
            <div className="tabela">
              {WIDOK.kroki.map(k => {
                if (k.bramka) return (
                  <div key={k.nr} className="wiersz wiersz-bramka">
                    <span className="w-nr">{k.nr}</span>
                    <span className="w-nazwa">◆ {k.nazwa}</span>
                    <span className="w-bramka-tag">{k.bramka}</span>
                  </div>
                );
                const pewnyTiket = k.tiketowy && !k.warunkowy;
                const docs = dokTiketu[k.nr] || [];
                return (
                  <div key={k.nr} className={"wiersz-blok" + (k.warunkowy ? ' wiersz-war' : '')}>
                    <div className="wiersz">
                      <span className="w-nr">{k.nr}</span>
                      <span className="w-nazwa">{k.nazwa}{k.warunkowy && <span className="w-galaz"> · ścieżka „{k.gałąź}"</span>}{k.wymagaDowodu && <span className="w-dowod"> · 📷 dowód</span>}</span>
                      <span className="w-stanowisko">{k.stanowisko}</span>
                      <span className="w-sla">{k.sla} {k.jedn}</span>
                      {k.tiketowy
                        ? <span className={"w-tag " + (k.warunkowy ? 'tag-war' : 'tag-t')} data-tip={k.warunkowy ? 'Tiket powstanie tylko jeśli proces pójdzie tą ścieżką po decyzji' : 'Tiket dla pracownika — powstanie od razu przy uruchomieniu'}>{k.warunkowy ? 'WARUNKOWY' : 'TIKET'}</span>
                        : <span className="w-tag tag-nt" data-tip="Krok klienta lub systemu — nie tworzy tiketu, proces tylko czeka na zdarzenie">NT</span>}
                    </div>
                    {/* dokumenty per tiket — tylko pewne T */}
                    {pewnyTiket && (
                      <div className="dok-tiket">
                        {docs.map((d, i) => (
                          <span key={i} className="dok-chip">🔗 {d.nazwa}<button onClick={() => usunDokument(k.nr, i)}>×</button></span>
                        ))}
                        {edycjaDok === k.nr ? (
                          <span className="dok-form">
                            <input className="dok-mini" value={dNazwa} onChange={e => setDNazwa(e.target.value)} placeholder="nazwa" autoFocus />
                            <input className="dok-mini" value={dUrl} onChange={e => setDUrl(e.target.value)} placeholder="link" />
                            <button className="dok-ok" disabled={!dNazwa.trim()} onClick={() => dodajDokument(k.nr)}>OK</button>
                            <button className="dok-x" onClick={() => { setEdycjaDok(null); setDNazwa(''); setDUrl(''); }}>×</button>
                          </span>
                        ) : (
                          <button className="dok-add" onClick={() => setEdycjaDok(k.nr)}>+ dokument</button>
                        )}
                      </div>
                    )}
                    {k.tiketowy && k.warunkowy && (
                      <div className="dok-tiket dok-war-info">dokumenty po wyborze ścieżki (z kokpitu)</div>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="podsumowanie-tiketow">
              Powstanie <b>{krokiTiketowe.filter(k => !k.warunkowy).length} pewnych tiketów</b> + <b>{krokiTiketowe.filter(k => k.warunkowy).length} warunkowych</b> (po decyzji). Pierwszy aktywny od razu, reszta oczekująca.
            </div>
            <div className="nawigacja">
              <button className="btn-ghost" onClick={() => setKrok(2)}>← Wstecz</button>
              <button className="btn-primary" onClick={() => setKrok(4)}>Dalej → przypisz osoby</button>
            </div>
          </div>
        )}

        {/* KROK 4 — przypisanie osób */}
        {krok === 4 && (
          <div className="panel">
            <h2>Przypisz osoby do stanowisk</h2>
            <p className="opis">Opcjonalne na teraz — zlecenie może ruszyć z częściowym przypisaniem. Nieobsadzone stanowiska trafią do zarządzającego, gdy ich tiket się aktywuje. Listę pracowników można zmieniać też później (np. gdy ktoś odejdzie).</p>
            <div className="przypisania">
              {stanowiskaDoObsady.map(st => (
                <div key={st} className="przypis-wiersz">
                  <span className="przypis-stanowisko">{st}</span>
                  <select value={przypisania[st] || ''} onChange={e => przypisz(st, e.target.value)}>
                    <option value="">— do przypisania później —</option>
                    {(PRACOWNICY[st] || []).map(os => <option key={os} value={os}>{os}</option>)}
                  </select>
                </div>
              ))}
            </div>
            <div className="info-slownik">ℹ Stanowiska i pracownicy to osobny słownik organizacji — edytowalny w każdej chwili, także w trakcie realizacji zleceń.</div>
            <div className="nawigacja">
              <button className="btn-ghost" onClick={() => setKrok(3)}>← Wstecz</button>
              <button className="btn-primary btn-uruchom" data-tip="Utwórz zlecenie i wygeneruj tikety z kroków pracowniczych" onClick={uruchom}>▶ Uruchom zlecenie</button>
            </div>
          </div>
        )}

        {/* KROK 5 — potwierdzenie */}
        {krok === 5 && uruchomione && (
          <div className="panel">
            <div className="sukces">✓ Zlecenie uruchomione</div>
            <div className="sukces-meta">{nrZlecenia} · {klient} · start {new Date(dataStart).toLocaleDateString('pl-PL')}{Object.values(dokTiketu).flat().length > 0 ? ` · 🔗 ${Object.values(dokTiketu).flat().length} dokumentów podpiętych` : ''}</div>
            <h3 className="utw-tytul">Utworzone tikety</h3>
            <div className="tabela">
              {krokiTiketowe.map((k, i) => {
                const aktywny = i === 0 && !k.warunkowy;
                return (
                  <div key={k.nr} className="wiersz">
                    <span className="w-nr">{k.nr}</span>
                    <span className="w-nazwa">{k.nazwa}</span>
                    <span className="w-stanowisko">{przypisania[k.stanowisko] || k.stanowisko}</span>
                    {k.warunkowy
                      ? <span className="w-tag tag-war">WARUNKOWY</span>
                      : aktywny ? <span className="w-tag tag-akt">● AKTYWNY</span>
                        : <span className="w-tag tag-ocz">OCZEKUJE</span>}
                  </div>
                );
              })}
            </div>
            <div className="podsumowanie-tiketow">
              Pierwszy tiket jest aktywny i pojawił się u przypisanej osoby. Kolejne aktywują się, gdy domknie się poprzedni. Tikety warunkowe — po wyborze ścieżki przy decyzji.
            </div>
            <button className="btn-primary" onClick={() => { setKrok(1); setKlient(''); setPrzypisania({}); setDokTiketu({}); setUruchomione(false); }}>Uruchom kolejne zlecenie</button>
          </div>
        )}
      </div>
      <div className="dol-pasek">
        <label className="podp-suwak">
          <input type="checkbox" checked={podpowiedzi} onChange={e => setPodpowiedzi(e.target.checked)} />
          <span className="podp-track"><span className="podp-galka" /></span>
          <span className="podp-label">Podpowiedzi {podpowiedzi ? "wł." : "wył."}</span>
        </label>
      </div>
      <div className="stopka">WORKFLY — od procesu do efektów · ZMIANOLOGICA, Dr Marcin Żółtak</div>
    </div>
  );
}

                <div key={t.id} className="dz-karta">
                  <span className="dz-typ">👤 WYMAGA PRZYPISANIA</span>
                  <div className="dz-tytul">{t.nazwa} <span className="dz-kontekst">({t.stanowisko})</span></div>
                  <KontekstT t={t} />
                  <div className="dz-przypisz">
                    <input className="dz-input" placeholder="imię i nazwisko" value={przypisInput[t.id] || ''} onChange={e => setPrzypisInput(s => ({ ...s, [t.id]: e.target.value }))} />
                    <button className="dz-btn-odhacz" onClick={() => przypisz(t)}>Przypisz</button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {zlecenia.length > 0 && sekcja === 'xor' && (
            <div className="panel">
              <h2>Decyzje XOR — historia</h2>
              <p className="opis">Podjęte wybory ścieżek (kto, kiedy — w realnej aplikacji z kontem; tu znacznik czasu).</p>
              {baza.decyzjeXor.length === 0 && <div className="dz-kontekst">Brak podjętych decyzji.</div>}
              {baza.decyzjeXor.map((d, i) => {
                const z = zlecenia.find(x => x.id === d.zlecenieId);
                const p = z && procesOf(z);
                const br = p && p.kroki.find(k => k.id === d.bramkaKrokId);
                const prz = p && p.przejscia.find(x => x.id === d.wybranePrzejscieId);
                return <div key={i} className="anul-wiersz"><b>{z ? z.nr : '?'}</b> · {br ? br.nazwa : 'bramka'} → „{prz ? prz.etykieta : '?'}" <span className="dz-kontekst">{new Date(d.kiedy).toLocaleString('pl-PL')}</span></div>;
              })}
            </div>
          )}

          {zlecenia.length > 0 && sekcja === 'przypisania' && (
            <div className="panel">
              <h2>Przypisania</h2>
              <p className="opis">Aktywne tikety i ich wykonawcy. Nieprzypisane znajdziesz też w „Wymaga decyzji".</p>
              {tikety.filter(t => t.typ === 'zadanie' && t.stan === 'aktywny').map(t => (
                <div key={t.id} className="anul-wiersz">{t.numer} · {t.nazwa} <span className="dz-kontekst">({t.stanowisko})</span> — <b>{t.osoba || 'NIEPRZYPISANY'}</b></div>
              ))}
            </div>
          )}

          {zlecenia.length > 0 && sekcja === 'monitor' && (
            <div className="panel">
              <h2>Monitorowanie</h2>
              <p className="opis">Stan wszystkich tiketów (makieta nie liczy jeszcze terminów baseline — kolumna terminu pojawi się z silnikiem dat).</p>
              {tikety.filter(t => t.typ === 'zadanie').map(t => (
                <div key={t.id} className="anul-wiersz">
                  <b>{t.zlecenieNr}</b> / {t.numer} · {t.nazwa}{t.widoczny === false ? ' ◌NT' : ''} — <span className="dz-kontekst">{t.stan === 'anulowany' ? '⊘ anulowany' : t.statusPracy === 'zrobione' ? '✓ zrobione' : t.stan}</span>
                </div>
              ))}
            </div>
          )}

          {zlecenia.length > 0 && sekcja === 'przepiecie' && (
            <div className="panel">
              <h2>Przepięcie zadań</h2>
              <p className="opis">Zmiana wykonawcy tiketu (np. po odejściu pracownika): wpisz nową osobę przy tikecie w sekcji „Przypisania" — pole edycji dostępne dla nieprzypisanych w „Wymaga decyzji"; pełne masowe przepinanie po osobie — funkcja produktu (Wariant B).</p>
            </div>
          )}

          {zlecenia.length > 0 && sekcja === 'dowody' && (
            <div className="panel">
              <h2>Dowody wykonania</h2>
              <p className="opis">Tikety wymagające zdjęcia-dowodu i ich status.</p>
              {zDowodem.length === 0 && <div className="dz-kontekst">Żaden tiket nie wymaga dowodu.</div>}
              {zDowodem.map(t => (
                <div key={t.id} className="anul-wiersz">
                  📷 {t.zlecenieNr} / {t.numer} · {t.nazwa} — <b>{t.dowodDolaczony ? '✓ dowód dołączony' : 'oczekuje na dowód'}</b>
                </div>
              ))}
            </div>
          )}

          {zlecenia.length > 0 && sekcja === 'anulowanie' && (
            <div className="panel">
              <h2>Anulowanie</h2>
              <p className="opis">Tikety niewybranych ścieżek XOR — system nigdy nie wygasza ich sam; anulowanie zawsze ręczne, z powodem.</p>
              {warunkoweDoAnulowania.length === 0 && <div className="dz-kontekst">Nic do anulowania.</div>}
              {warunkoweDoAnulowania.map(t => (
                <div key={t.id} className="anul-wiersz">
                  {t.zlecenieNr} / {t.numer} · {t.nazwa} <span className="dz-kontekst">(ścieżka niewybrana)</span>
                  <button className="anul-btn" onClick={() => setAnulModal(t)}>⊘ Anuluj</button>
                </div>
              ))}
              {anulowane.length > 0 && <><h2 style={{ marginTop: 20 }}>Anulowane</h2>
                {anulowane.map(t => <div key={t.id} className="anul-wiersz anul-zrobiony">{t.zlecenieNr} / {t.numer} · {t.nazwa} <span className="dz-kontekst">powód: {t.powodAnulowania}</span></div>)}</>}
            </div>
          )}
        </main>
      </div>

      {anulModal && (
        <div className="modal-tlo" onClick={() => setAnulModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-tytul">Anulować tiket „{anulModal.nazwa}"?</div>
            <div className="modal-tresc">Podaj powód — zostanie zapisany jako ślad decyzji.</div>
            <input className="dz-input" autoFocus placeholder="powód anulowania" value={anulPowod} onChange={e => setAnulPowod(e.target.value)} />
            <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
              <button className="anul-btn" disabled={!anulPowod.trim()} onClick={anuluj}>⊘ Anuluj tiket</button>
              <button className="dz-btn-odhacz" onClick={() => setAnulModal(null)}>Wróć</button>
            </div>
          </div>
        </div>
      )}
      <Stopka />
    </div>
  );
}

  if (!rola) {
    return (
      <div className="v4-login">
        <style>{powlokaCss}</style>
        <div className="v4-login-box">
          <div className="v4-logo">WORKFLY</div>
          <div className="v4-haslo">od procesu do efektów</div>
          <div className="v4-login-tyt">Zaloguj się jako…</div>
          <div className="v4-login-podp">W prawdziwej aplikacji logujesz się hasłem, a system zna Twoje role. Tu wybierasz rolę, by zobaczyć, co dana osoba widzi.</div>
          <div className="v4-role">
            {Object.entries(ROLE).map(([id, r]) => (
              <button key={id} className="v4-rola" onClick={() => { setRola(id); setAktywnyModul(ROLE[id].moduly[0]); }}>
                <span className="v4-rola-ikona">{r.ikona}</span>
                <span className="v4-rola-nazwa">{r.nazwa}</span>
                <span className="v4-rola-mod">{r.moduly.length === 1 ? MODULY[r.moduly[0]].nazwa : `dostęp do wszystkiego (${r.moduly.length} moduły)`}</span>
              </button>
            ))}
          </div>
          <div className="v4-login-stopka">ZMIANOLOGICA · Dr Marcin Żółtak</div>
        </div>
      </div>
    );
  }

  const dostepneModuly = ROLE[rola].moduly;
  const Komponent = MODULY[aktywnyModul].komponent;

  return (
    <div className="v4-app">
      <style>{powlokaCss}</style>
      {/* górny pasek powłoki */}
      <div className="v4-pasek">
        <div className="v4-pasek-lewo">
          <span className="v4-pasek-logo">WORKFLY</span>
          {dostepneModuly.length > 1 && (
            <div className="v4-przelacznik">
              {dostepneModuly.map(m => (
                <button key={m} className={"v4-mod-btn" + (aktywnyModul === m ? " v4-mod-on" : "")} onClick={() => setAktywnyModul(m)}>
                  <span>{MODULY[m].ikona}</span> {MODULY[m].nazwa}
                </button>
              ))}
            </div>
          )}
          {dostepneModuly.length === 1 && <span className="v4-pasek-modul">{MODULY[aktywnyModul].ikona} {MODULY[aktywnyModul].nazwa}</span>}
        </div>
        <div className="v4-pasek-prawo">
          <span className="v4-rola-tag">{ROLE[rola].ikona} {ROLE[rola].nazwa}</span>
          <span className="v4-urzadzenie">{MODULY[aktywnyModul].urzadzenie}</span>
          <button className="v4-wyloguj" onClick={() => { setRola(null); setAktywnyModul(null); }}>Wyloguj</button>
        </div>
      </div>
      {/* moduł */}
      <div className="v4-modul-kontener">
        <Komponent />
      </div>
    </div>
  );
}

</script>
